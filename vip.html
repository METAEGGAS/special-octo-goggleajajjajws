<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مكافأة كبار الشخصيات</title><style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#000;color:#fff}body:before{content:"";position:fixed;inset:0;background:radial-gradient(90% 55% at 20% 8%,#4b2f08 0,#1a1005 35%,#000 72%),linear-gradient(#120b03,#000 45%);z-index:-2}body:after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(255,190,90,.06),transparent 20%,transparent 80%,rgba(255,190,90,.03));z-index:-1}.w{max-width:430px;margin:auto;min-height:100vh;padding:14px 14px 28px}.top{display:flex;align-items:center;justify-content:center;position:relative;padding:8px 0 16px}.back{position:absolute;left:0;top:4px;font-size:26px;color:#f5dfb2;cursor:pointer}.ttl{font-size:28px;font-weight:700;letter-spacing:.2px;text-shadow:0 0 10px rgba(255,210,120,.08)}.stats{display:grid;grid-template-columns:120px 1fr 1fr;gap:10px;align-items:center;margin-top:8px}.coin{width:106px;height:106px;border-radius:50%;margin:auto;background:radial-gradient(circle at 35% 30%,#fff 0,#d2d6db 18%,#969ca3 40%,#686d74 60%,#c7ccd1 77%,#51565e 100%);border:4px solid #cfd4da;box-shadow:0 8px 25px rgba(0,0,0,.45),inset 0 0 0 3px #6d737b,inset 0 0 22px rgba(255,255,255,.25);display:grid;place-items:center;position:relative}.coin:before{content:"✦";font-size:44px;color:#444;text-shadow:0 1px 0 #eee,0 0 12px rgba(255,255,255,.28)}.coin:after{content:"VIP\AII";white-space:pre;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;line-height:1;color:#565a61;font-weight:700}.mid .big{font-size:58px;font-weight:800;line-height:1;color:#f8e2b2;text-shadow:0 0 14px rgba(255,215,120,.08)}.stat{padding:7px 0}.n{font-size:34px;font-weight:800;color:#f3dfb6;line-height:1.05}.lb{font-size:14px;color:#d3c3a1;line-height:1.45}.mid .lb{font-size:18px}.rgt,.mid{display:grid;gap:16px}.sliderBox{margin:20px 0 14px;position:relative;padding:4px 0 30px}.svgWrap{position:relative;height:120px}.trackSvg{width:100%;height:120px;display:block;overflow:visible}.pathBg{stroke:#c9c9c9;stroke-opacity:.8;stroke-width:3;fill:none;stroke-linecap:round}.pathGlow{stroke:url(#g);stroke-width:3.5;fill:none;stroke-linecap:round;filter:drop-shadow(0 0 7px rgba(255,225,150,.55))}.node{fill:#d6d6d6}.node.locked{fill:#bbb}.locktxt{font-size:11px;fill:#f1f1f1;opacity:.95}.lab{font-size:15px;font-weight:700;fill:#bdb6ac}.lab.a{fill:#ffe1a1;filter:drop-shadow(0 0 4px rgba(255,214,120,.7))}.thumbGlow{fill:rgba(255,221,140,.24);filter:blur(6px)}.thumb{fill:#ffe5ac;stroke:#fff2cf;stroke-width:1.2;filter:drop-shadow(0 0 8px rgba(255,223,136,.9))}.range{position:absolute;inset:0 0 24px;opacity:.001;cursor:pointer;width:100%;height:100%;margin:0}.btn{height:56px;border:none;width:100%;border-radius:28px;background:linear-gradient(90deg,#907143,#b08d55,#9b7b49);color:#2a200f;font-size:22px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 10px 22px rgba(0,0,0,.28)}.sec{margin-top:24px}.sec h2{margin:0 0 16px;font-size:24px;line-height:1.4;color:#fff1cb;text-shadow:0 0 10px rgba(255,210,120,.06)}.tbl{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:0;overflow:hidden}.row{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr}.cell{min-height:96px;padding:16px 10px;border-left:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;color:#e8dcc0;background:rgba(255,255,255,.025)}.row .cell:last-child{border-left:none}.vals .cell{font-size:32px;font-weight:800;color:#fff}.badge{min-width:58px;height:28px;padding:0 12px;border-radius:7px;background:linear-gradient(#f7dca0,#dfb86b);color:#2f2413;font-size:20px;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.65)}@media (max-width:390px){.ttl{font-size:24px}.stats{grid-template-columns:92px 1fr 1fr}.coin{width:84px;height:84px}.mid .big{font-size:46px}.n{font-size:28px}.lb{font-size:13px}.mid .lb{font-size:16px}.cell{font-size:13px;padding:12px 6px}.vals .cell{font-size:27px}.btn{font-size:20px}}</style></head><body><div class="w"><div class="top"><div class="back">‹</div><div class="ttl">مكافأة كبار الشخصيات</div></div><div class="stats"><div class="coin"></div><div class="mid"><div class="stat"><div class="big">0</div><div class="lb">تم صرف الراتب</div></div><div class="stat"><div class="n">0</div><div class="lb">تم استلام الأرباح</div></div><div class="stat"><div class="n">0</div><div class="lb">توزيع الأرباح اليوم</div></div></div><div class="rgt"><div class="stat"><div class="n">0</div><div class="lb">إجمالي الأرباح الموزعة</div></div><div class="stat"><div class="n">0</div><div class="lb">الأسهم التي لم تستلم بعد</div></div></div></div><div class="sliderBox"><div class="svgWrap"><svg class="trackSvg" viewBox="0 0 400 120"><defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#fff5cc"/><stop offset=".35" stop-color="#f2d18f"/><stop offset="1" stop-color="#b8b8b8"/></linearGradient></defs><path id="arc" d="M15 92 Q200 34 385 92" class="pathBg"/><path id="prog" d="" class="pathGlow"/><g id="marks"></g><circle id="thumbGlow" r="14" class="thumbGlow" cx="15" cy="92"/><circle id="thumb" r="6.5" class="thumb" cx="15" cy="92"/></svg><input id="vip" class="range" type="range" min="0" max="9" step="1" value="0"></div><button class="btn">استلام الأرباح</button></div><div class="sec"><h2>امتيازات حصرية لأعضاء كبار الشخصيات</h2><div class="tbl"><div class="row"><div class="cell">راتب كل 10 أيام</div><div class="cell">عدد أعضاء الفريق الفعال</div><div class="cell">عدد المرؤوسين المباشرين</div><div class="cell">درجة كبار الشخصيات</div></div><div class="row vals"><div class="cell">30</div><div class="cell">5</div><div class="cell">5</div><div class="cell"><span class="badge" id="vBadge">V1</span></div></div></div></div></div><script>let r=vip,a=arc,p=prog,m=marks,t=thumb,g=thumbGlow,b=vBadge,L=a.getTotalLength(),N=10;function mk(){let s='';for(let i=0;i<N;i++){let q=i/(N-1),o=a.getPointAtLength(L*q),y=o.y+24,c=i==0?'a':'';s+=`<circle class="node ${i?'locked':''}" cx="${o.x}" cy="${o.y}" r="${i?3.8:4.2}"></circle>`+(i?`<text class="locktxt" x="${o.x}" y="${o.y-10}" text-anchor="middle">🔒</text>`:'')+`<text class="lab ${c}" id="lab${i}" x="${o.x}" y="${y}" text-anchor="middle">VIP${i}</text>`}m.innerHTML=s}function up(){let i=+r.value,q=i/(N-1),len=L*q,o=a.getPointAtLength(len),d=`M15 92 `;for(let k=1;k<=90;k++){let n=len*k/90,pt=a.getPointAtLength(n);d+=(k?'L':'')+pt.x+' '+pt.y+' '}if(i==0)d='M15 92 L15 92';p.setAttribute('d',d);t.setAttribute('cx',o.x);t.setAttribute('cy',o.y);g.setAttribute('cx',o.x);g.setAttribute('cy',o.y);for(let j=0;j<N;j++)document.getElementById('lab'+j).setAttribute('class','lab'+(j==i?' a':''));b.textContent='V'+(i+1)}mk();up();r.oninput=up;addEventListener('resize',()=>setTimeout(()=>{L=a.getTotalLength();mk();up()},60));</script></body></html>
