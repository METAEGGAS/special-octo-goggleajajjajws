<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>KYC</title><style>*{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font:14px Tahoma,Arial,sans-serif}img{display:block}.a{max-width:430px;min-height:100vh;margin:auto;padding:10px 14px 22px}.p{display:none}.p.on{display:block}.h{height:44px;display:flex;align-items:center;justify-content:center;position:relative;font-size:17px}.b{position:absolute;left:0;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;background:0;color:#fff;font-size:24px;cursor:pointer}.t{margin:14px 4px 10px;font-size:15px}.sel,.u{background:#121313;border-radius:18px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}.sel{height:58px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}.arr{font-size:20px;color:#d6b06d}.btn{width:100%;height:52px;border:0;border-radius:16px;background:#d6b06d;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:18px}.btn:disabled{opacity:.45;cursor:not-allowed}.lbl{margin:18px 4px 10px;font-size:15px}.u{height:172px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;cursor:pointer}.ph{width:230px;height:116px;object-fit:contain;border-radius:10px}.add{width:64px;height:64px;object-fit:contain}.sub{margin-top:22px}.ov,.sh{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:9}.ov.on,.sh.on{display:flex}.rv{width:210px;height:170px;background:#121313;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}.sp{width:56px;height:56px;border:4px solid #5d4b2a;border-top-color:#d6b06d;border-radius:50%;animation:rot .9s linear infinite}.rt{font-size:22px;font-weight:700}.sheet{width:min(430px,100vw);max-height:78vh;background:#111;border-radius:22px 22px 0 0;padding:14px 14px 18px;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}.gr{width:52px;height:5px;background:#444;border-radius:99px;margin:0 auto 10px}.st{font-size:17px;text-align:center;margin:8px 0 12px}.list{max-height:60vh;overflow:auto}.it{padding:14px 12px;border-radius:14px;background:#151515;margin:8px 0;cursor:pointer}.it:hover{background:#1b1b1b}@keyframes rot{to{transform:rotate(360deg)}}</style><div class=a><section class="p on" id=p1><div class=h><div>اختيار الدولة</div></div><div class=t>الدولة</div><div class=sel id=openCountry><span id=countryText style=color:#8f8f8f>اختر الدولة</span><span class=arr>⌄</span></div><button class=btn id=next disabled>التالي</button></section><section class=p id=p2><div class=h><button class=b id=back>‹</button><div>التحقق من هوية العميل (kyc)</div></div><div class=lbl>صورة الهوية (أمامية)</div><label class=u><img class=ph src="https://h5.iuxp.com/assets/idCard_front-46e1ba30.png"><img class=add src="https://h5.iuxp.com/assets/add-7d5c489c.png"><input type=file accept="image/*" hidden></label><div class=lbl>صورة الوثيقة (الجانب الخلفي)</div><label class=u><img class=ph src="https://h5.iuxp.com/assets/idCard_back-73814029.png"><img class=add src="https://h5.iuxp.com/assets/add-7d5c489c.png"><input type=file accept="image/*" hidden></label><div class=lbl>صورة مع وثيقة الهوية</div><label class=u><img class=ph src="https://h5.iuxp.com/assets/handheld_idCard-3195cf65.png"><img class=add src="https://h5.iuxp.com/assets/add-7d5c489c.png"><input type=file accept="image/*" hidden></label><button class="btn sub" id=send>تقديم</button></section></div><div class=sh id=sheet><div class=sheet><div class=gr></div><div class=st>اختر الدولة</div><div class=list id=list></div></div></div><div class=ov id=review><div class=rv><div class=sp></div><div class=rt>قيد مراجعة</div></div></div><script>let c="",countries=["السعودية","الإمارات","الكويت","قطر","البحرين","عمان","مصر","الأردن","العراق","المغرب","الجزائر","تونس","ليبيا","السودان","اليمن","لبنان","فلسطين","تركيا","فرنسا","ألمانيا"],$=e=>document.querySelector(e),$$=e=>document.querySelectorAll(e);$("#list").innerHTML=countries.map(v=>`<div class=it>${v}</div>`).join("");$("#openCountry").onclick=()=>$("#sheet").classList.add("on");$("#sheet").onclick=e=>{if(e.target.id=="sheet")$("#sheet").classList.remove("on")};$$(".it").forEach(i=>i.onclick=()=>{c=i.textContent;$("#countryText").textContent=c;$("#countryText").style.color="#fff";$("#next").disabled=0;$("#sheet").classList.remove("on")});$("#next").onclick=()=>{$("#p1").classList.remove("on");$("#p2").classList.add("on")};$("#back").onclick=()=>{$("#p2").classList.remove("on");$("#p1").classList.add("on")};$$(".u input").forEach(i=>i.onchange=e=>{let f=e.target.files[0],p=e.target.parentNode.querySelector(".ph");if(f){p.src=URL.createObjectURL(f);p.style.objectFit="cover";p.style.width="230px";p.style.height="116px"}});$("#send").onclick=()=>$("#review").classList.add("on");</script></html>
