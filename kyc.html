<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>KYC</title><style>:root{--b:#000;--c:#101313;--w:#fff;--m:#a3a3a3;--g1:#8f7a54;--g2:#c8aa70;--e:#c86e64}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;min-height:100%;background:var(--b);color:var(--w);font:14px Tahoma,Arial,sans-serif;overflow:hidden}body{min-height:100dvh}button,input{font:inherit}::-webkit-scrollbar{width:0;height:0}.p{display:none;min-height:100dvh;padding:8px 18px 24px;overflow:auto}.p.on{display:block}.h{height:46px;display:flex;align-items:center;justify-content:center;position:relative;font-size:17px}.bk{position:absolute;left:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border:0;background:none;color:#fff;font-size:28px;cursor:pointer;padding:0}.lab{margin:20px 4px 10px;font-size:15px}.f{width:100%;height:58px;border:0;border-radius:16px;background:var(--c);color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);cursor:pointer}.f .r{color:#fff}.f .a{color:#6f6f6f;font-size:18px}.inp{padding:0;cursor:auto}.inp input{width:100%;height:58px;border:0;outline:0;background:none;color:#fff;padding:0 16px}.inp input::placeholder{color:#7a7a7a}.er{padding:6px 4px 0;font-size:12px;color:var(--e)}.btn{width:100%;height:52px;margin-top:18px;border:0;border-radius:999px;background:linear-gradient(90deg,var(--g1),var(--g2));color:#2d2518;font-weight:700;font-size:16px;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.u{height:170px;padding:18px;border-radius:18px;background:var(--c);display:flex;align-items:center;justify-content:space-between;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);cursor:pointer}.ph{width:228px;height:114px;object-fit:contain;border-radius:12px;background:#0d0f0f}.ad{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:#181c1c;color:#c9ab72;font-size:34px;flex:none}.ov{position:fixed;inset:0;background:#000c;display:none;z-index:9}.ov.on{display:block}.pick{position:absolute;inset:0;background:#111;padding:10px 14px 16px}.phd{height:46px;display:flex;align-items:center;justify-content:space-between}.pt{font-size:17px}.cx{border:0;background:none;color:#d6b06d;font-size:16px;cursor:pointer}.sch{margin:12px 0 10px}.sch input{width:100%;height:56px;border:0;outline:0;border-radius:14px;background:#151515;color:#fff;padding:0 16px}.sch input::placeholder{color:#7d7d7d}.lst{height:calc(100dvh - 132px);overflow:auto}.it{width:100%;padding:16px 10px;border:0;border-bottom:1px solid rgba(255,255,255,.06);background:none;color:#fff;display:flex;align-items:center;justify-content:space-between;text-align:right;cursor:pointer}.it b{font-weight:400;color:#dedede;direction:ltr}.it.x{background:rgba(255,255,255,.03)}.rv{position:fixed;inset:0;background:#000c;display:none;place-items:center;z-index:10}.rv.on{display:grid}.bx{width:210px;height:170px;background:#121313;border-radius:22px;display:grid;place-items:center;gap:14px;padding:18px;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}.sp{width:56px;height:56px;border:4px solid #5d4b2a;border-top-color:#d6b06d;border-radius:50%;animation:r .9s linear infinite}.rt{font-size:22px;font-weight:700}@keyframes r{to{transform:rotate(360deg)}}</style></head><body>
<section class="p on" id="p1">
  <div class="h"><button class="bk" id="back1">‹</button><div>المعلومات الشخصية</div></div>
  <div class="lab">الجنسية</div>
  <button class="f" id="openCountry"><span class="r" id="country">الجزائر</span><span class="a">⌄</span></button>
  <div class="lab">نوع المستند</div>
  <button class="f" id="openDoc"><span class="r" id="doctype">بطاقة الهوية</span><span class="a">›</span></button>
  <div class="lab"></div>
  <div class="f inp"><input id="idn" inputmode="numeric" autocomplete="off" placeholder="يرجى إدخال رقم هويتك"></div>
  <div class="er" id="err">يرجى إدخال رقم هويتك</div>
  <button class="btn" id="next">الخطوة التالية</button>
</section>

<section class="p" id="p2">
  <div class="h"><button class="bk" id="back2">‹</button><div>التحقق من هوية العميل (KYC)</div></div>
  <div class="lab">صورة الهوية (أمامية)</div>
  <label class="u"><img class="ph" src="https://h5.iuxp.com/assets/idCard_front-46e1ba30.png"><div class="ad">+</div><input class="fi" type="file" accept="image/*" hidden></label>
  <div class="lab">صورة الوثيقة (الجانب الخلفي)</div>
  <label class="u"><img class="ph" src="https://h5.iuxp.com/assets/idCard_back-73814029.png"><div class="ad">+</div><input class="fi" type="file" accept="image/*" hidden></label>
  <div class="lab">صورة مع وثيقة الهوية</div>
  <label class="u"><img class="ph" src="https://h5.iuxp.com/assets/handheld_idCard-3195cf65.png"><div class="ad">+</div><input class="fi" type="file" accept="image/*" hidden></label>
  <button class="btn" id="send">تقديم</button>
</section>

<div class="ov" id="pick">
  <div class="pick">
    <div class="phd"><div class="pt" id="pt">اختر الدولة/المنطقة</div><button class="cx" id="closePick">إلغاء</button></div>
    <div class="sch" id="srw"><input id="s" placeholder="ابحث عن دولة أو عنوان"></div>
    <div class="lst" id="list"></div>
  </div>
</div>

<div class="rv" id="review"><div class="bx"><div class="sp"></div><div class="rt" id="rtext">قيد المراجعة</div></div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAnalytics}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,doc,setDoc,onSnapshot,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import{getStorage,ref,uploadBytes,getDownloadURL}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

const firebaseConfig={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"},
app=initializeApp(firebaseConfig);try{getAnalytics(app)}catch(e){}
const au=getAuth(app),db=getFirestore(app),st=getStorage(app),$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
let U,M="c",cn="الجزائر",cc="+213",dt="بطاقة الهوية";
const C=[["أفغانستان","+93"],["Shqipëri","+355"],["الجزائر","+213"],["American Samoa","+1684"],["Andorra","+376"],["Angola","+244"],["Anguilla","+1264"],["Antigua and Barbuda","+1268"],["Argentina","+54"],["Հայաստան","+374"],["Aruba","+297"],["Australia","+61"],["البحرين","+973"],["بنغلاديش","+880"],["Belgium","+32"],["البرازيل","+55"],["Canada","+1"],["الصين","+86"],["مصر","+20"],["فرنسا","+33"],["ألمانيا","+49"],["العراق","+964"],["الأردن","+962"],["الكويت","+965"],["لبنان","+961"],["ليبيا","+218"],["المغرب","+212"],["عمان","+968"],["فلسطين","+970"],["قطر","+974"],["السعودية","+966"],["السودان","+249"],["سوريا","+963"],["تونس","+216"],["تركيا","+90"],["الإمارات","+971"],["المملكة المتحدة","+44"],["الولايات المتحدة","+1"],["اليمن","+967"]],
D=["بطاقة الهوية","جواز السفر","رخصة القيادة"];

function sw(a,b){$(a).classList.add("on");$(b).classList.remove("on")}
function openPick(m){M=m;$("#pick").classList.add("on");$("#s").value="";$("#pt").textContent=m=="c"?"اختر الدولة/المنطقة":"اختر نوع المستند";$("#srw").style.display=m=="c"?"block":"none";render("")}
function render(q=""){q=q.trim().toLowerCase();$("#list").innerHTML=(M=="c"?C.filter(v=>(v[0]+v[1]).toLowerCase().includes(q)).map(v=>`<button class="it${v[0]==cn?" x":""}" data-n="${v[0]}" data-c="${v[1]}"><span>${v[0]}</span><b>${v[1]}</b></button>`):D.filter(v=>v.toLowerCase().includes(q)).map(v=>`<button class="it${v==dt?" x":""}" data-d="${v}"><span>${v}</span></button>`)).join("")||'<div class="it"><span>لا توجد نتائج</span></div>'}

$("#openCountry").onclick=()=>openPick("c");
$("#openDoc").onclick=()=>openPick("d");
$("#closePick").onclick=()=>$("#pick").classList.remove("on");
$("#s").oninput=e=>render(e.target.value);
$("#list").onclick=e=>{let x=e.target.closest(".it");if(!x)return;if(M=="c"){cn=x.dataset.n;cc=x.dataset.c;$("#country").textContent=cn}else{dt=x.dataset.d;$("#doctype").textContent=dt}$("#pick").classList.remove("on")};
$("#idn").oninput=e=>$("#err").style.display=e.target.value.trim()?"none":"block";
$("#next").onclick=()=>{let v=$("#idn").value.trim();$("#err").style.display=v?"none":"block";if(v)sw("#p2","#p1")};
$("#back1").onclick=()=>history.length>1?history.back():location.href="my.html";
$("#back2").onclick=()=>location.href="my.html";
$$(".fi").forEach(i=>i.onchange=e=>{let f=e.target.files[0],p=e.target.closest("label").querySelector(".ph");if(f){p.src=URL.createObjectURL(f);p.style.objectFit="cover"}});

onAuthStateChanged(au,u=>{U=u;if(!u)return;onSnapshot(doc(db,"kyc_requests",u.uid),async s=>{let d=s.data();if(!d||!d.status)return;if(d.status=="approved")await setDoc(doc(db,"users",u.uid),{kyc:true,kyc_status:"approved",kycUpdatedAt:serverTimestamp()},{merge:true});if(d.status=="rejected")await setDoc(doc(db,"users",u.uid),{kyc:false,kyc_status:"rejected",kycUpdatedAt:serverTimestamp()},{merge:true})})});

async function up(f,n){let r=ref(st,`kyc/${U.uid}/${n}_${Date.now()}_${Math.random().toString(36).slice(2)}_${f.name}`);await uploadBytes(r,f);return await getDownloadURL(r)}

$("#send").onclick=async()=>{
  let id=$("#idn").value.trim(),f=$$(".fi").map(i=>i.files[0]);
  if(!U)return alert("يجب تسجيل الدخول أولاً");
  if(!id)return sw("#p1","#p2"),$("#err").style.display="block";
  if(f.some(v=>!v))return alert("أكمل رفع الصور الثلاث");
  try{
    $("#review").classList.add("on");$("#send").disabled=1;
    let[a,b,c]=await Promise.all([up(f[0],"front"),up(f[1],"back"),up(f[2],"selfie")]),t=serverTimestamp();
    await setDoc(doc(db,"kyc_requests",U.uid),{uid:U.uid,email:U.email||"",country:cn,countryCode:cc,documentType:dt,idNumber:id,frontUrl:a,backUrl:b,selfieUrl:c,status:"pending",createdAt:t,updatedAt:t},{merge:true});
    await setDoc(doc(db,"users",U.uid),{kyc:false,kyc_status:"pending",kycRequestId:U.uid,kycSubmittedAt:t,nationality:cn,documentType:dt,idNumber:id},{merge:true});
    $("#rtext").textContent="قيد المراجعة";
  }catch(e){$("#review").classList.remove("on");$("#send").disabled=0;alert("حدث خطأ أثناء الإرسال")}
};
</script></body></html>
