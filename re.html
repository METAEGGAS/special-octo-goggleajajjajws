<!doctype html><html lang=ar dir=rtl><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>DunFin</title><style>:root{--y:#ffd21f;--t:#000;--r:#e60039;--g:#00b050;--bg:#f4f4f4;--c:#fff;--bd:#eee;--m:#666;--sh:0 6px 18px rgba(0,0,0,.06)}html.dk{--t:#fff;--bg:#000;--c:#000;--bd:#1a1a1a;--m:#aaa;--sh:0 6px 18px rgba(0,0,0,.8);--r:#ff3860;--g:#23d18b}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}html,body{margin:0;height:100%;background:var(--bg);font-family:"Noto Sans Arabic",Tahoma,Arial,sans-serif;color:var(--t);overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}body,body *{direction:rtl}.app{width:100vw;min-height:100svh;background:var(--c);padding:67px 10px 102px;animation:fi .5s cubic-bezier(.2,.8,.2,1) both}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.tb{position:fixed;inset:0 0 auto;background:var(--c);z-index:50;padding:11px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-direction:row-reverse;backdrop-filter:blur(8px)}.tL,.tR{display:flex;align-items:center;flex-direction:row-reverse}.tR{gap:12px}.lst{width:30px;height:30px;object-fit:contain;cursor:pointer;display:block;transition:transform .2s}.lst:active,.env:active{transform:scale(.9)}.sch{color:var(--t);font-size:17px;cursor:pointer;font-weight:600;padding:7px 12px;border-radius:12px;line-height:1;background:rgba(0,0,0,.03)}html.dk .sch{border:1px solid rgba(255,255,255,.85);background:transparent}.tm{font:700 21px/1 Arial;direction:ltr;color:var(--t)}.env{width:31px;height:24px;object-fit:contain;display:block;cursor:pointer;transition:transform .2s}.adv{display:flex;align-items:center;gap:8px;padding:7px 0;margin:0 0 15px;font-size:16px;color:var(--t);flex-direction:row-reverse}.sp{width:24px;height:24px;flex:0 0 24px;object-fit:contain;display:block}.advT{flex:1;white-space:nowrap;overflow:hidden;text-align:right;direction:rtl}.advT span{display:inline-block;padding-right:100%;animation:mar 16s linear infinite}@keyframes mar{to{transform:translateX(-100%)}}.m5{display:flex;justify-content:space-between;padding:4px 0 22px;gap:4px}.m5 a{flex:1;min-width:0;text-decoration:none;color:var(--t);text-align:center;font-size:16px;font-weight:600;transition:transform .15s}.m5 a:active{transform:scale(.94)}.m5 img{width:50px;height:50px;margin:0 auto 7px;display:block;object-fit:contain}.cta{width:100%;border:0;border-radius:27px;background:var(--y);padding:17px;margin:8px 0 28px;font:700 22px Tahoma,Arial;cursor:pointer;color:#000;transition:transform .15s;box-shadow:0 4px 14px rgba(255,210,31,.25)}.cta:active{transform:scale(.98)}.hero{height:158px;border-radius:11px;overflow:hidden;position:relative;box-shadow:var(--sh);background:#111}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .7s ease}.hero img.on{opacity:1}.dots{display:flex;justify-content:center;gap:5px;padding:7px 0 11px}.dots i{width:7px;height:7px;border-radius:50%;background:#dcdcdc;transition:.35s ease}html.dk .dots i{background:#333}.dots i.on{width:17px;border-radius:8px;background:var(--y)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:19px 14px;margin-top:4px}.coin{text-align:left;direction:ltr;min-width:0}.pr{display:flex;align-items:center;justify-content:space-between;font:700 18px/1.2 Arial;color:var(--t);gap:6px}.pct{font-weight:700;color:var(--r);font-size:16px;transition:color .4s}.pct.up,.pri.up,.chg.up{color:var(--g)}.pri{font:700 20px/1.6 Arial;color:var(--r);direction:ltr;transition:color .4s}.spk{width:100%;height:36px;overflow:visible}.spk path{fill:none;stroke:var(--r);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .4s,d .8s ease}.spk path.up{stroke:var(--g)}.qs{margin-top:11px}.qh,.qs .rw{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;direction:rtl;gap:0}.qh{padding:9px 0 5px;color:var(--t);font-size:15px;font-weight:600}.qh div:nth-child(1){text-align:right;padding-right:4px}.qh div:nth-child(2){text-align:center}.qh div:nth-child(3){text-align:left;padding-left:4px}.qs .rw{padding:13px 0;border-bottom:1px solid var(--bd);transition:background .15s}.qs .rw:active{background:rgba(0,0,0,.03)}html.dk .qs .rw:active{background:rgba(255,255,255,.05)}.qs .rw:last-child{border:0}.nm{display:flex;align-items:center;gap:8px;min-width:0;justify-content:flex-start;direction:ltr;padding-left:4px}.nm img{width:35px;height:35px;object-fit:contain;flex:0 0 35px}.nm b{font:700 19px Arial;color:var(--t);direction:ltr}.lp{font:700 19px Arial;color:var(--t);text-align:center;direction:ltr;transition:color .4s}.chg{justify-self:start;min-width:74px;padding:9px 4px;border-radius:7px;text-align:center;color:#fff;background:var(--r);font-weight:700;direction:ltr;font-size:16px;margin-right:4px;transition:background .4s}.chg.up{background:var(--g)}.nav{position:fixed;inset:auto 0 0;background:var(--c);display:flex;justify-content:space-around;padding:9px 4px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--bd);z-index:50;backdrop-filter:blur(8px)}.nav a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--m);font-size:16px;min-width:69px;font-weight:600;transition:transform .15s}.nav a:active{transform:scale(.92)}.nav img{width:31px;height:31px;object-fit:contain}.nav a.on{color:var(--t)}.nav a.on span{position:relative}.nav a.on span:before{content:"";position:absolute;left:50%;transform:translateX(-50%);top:-7px;width:23px;height:3px;background:var(--y);border-radius:9px}.drw{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:99;backdrop-filter:blur(2px)}.drw.op{opacity:1;pointer-events:auto}.pn{position:fixed;top:0;left:0;transform:translateX(-100%);width:84%;max-width:360px;height:100%;background:var(--c);transition:transform .4s cubic-bezier(.22,.8,.27,1);z-index:100;overflow-y:auto;padding:20px 16px 26px;-webkit-overflow-scrolling:touch;will-change:transform}.drw.op .pn{transform:none}.hd{display:flex;align-items:flex-start;gap:12px;padding:6px 4px 16px;border-bottom:1px solid var(--bd);flex-direction:row-reverse;position:relative}.hd .av{width:57px;height:57px;border-radius:50%;background:#f7e08a;display:flex;align-items:center;justify-content:center;flex:0 0 57px;position:relative;overflow:hidden}.hd .av:before{content:"";width:19px;height:19px;border-radius:50%;background:#bfa14a;position:absolute;top:14px;left:50%;transform:translateX(-50%)}.hd .av:after{content:"";width:35px;height:19px;border-radius:19px 19px 0 0;background:#bfa14a;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}.hd .info{flex:1;min-width:0}.hd .nk{font:700 19px Arial;color:var(--t);direction:ltr;text-align:right}.hd .id{font-size:15px;color:var(--y);margin-top:4px;direction:ltr;text-align:right;display:flex;align-items:center;gap:6px;justify-content:flex-end;font-weight:700}.cpy{width:15px;height:15px;object-fit:contain;display:block}.hd .lv{position:absolute;top:6px;left:4px;background:var(--r);color:#fff;font:700 13px Arial;padding:3px 10px;border-radius:4px;direction:ltr}.mode{display:flex;align-items:center;gap:10px;padding:15px 2px;border-bottom:1px solid var(--bd);color:var(--t);font-size:17px;direction:rtl;cursor:pointer;font-weight:600;transition:opacity .15s;justify-content:flex-start}.mode:active{opacity:.6}.mode .dki{width:25px;height:25px;object-fit:contain;flex:0 0 25px}html.dk .mode .dki,html.dk .mi img{filter:brightness(0) invert(1)}.mi{display:flex;align-items:center;gap:10px;padding:14px 2px;border-bottom:1px solid var(--bd);cursor:pointer;color:var(--t);font-size:17px;direction:rtl;transition:opacity .15s;justify-content:flex-start}.mi:active{opacity:.55}.mi img{width:27px;height:27px;object-fit:contain;flex:0 0 27px}.mi .tx{text-align:right;font-weight:600}.mi .ar{color:var(--m);font-size:19px;margin-right:auto}.mi:last-child{border:0}</style><body><div class=tb><div class=tR><img class=lst id=lsI alt><span class=sch>بحث</span></div><div class=tm id=tm></div><div class=tL><img class=env id=msgI alt></div></div><div class=app><div class=adv><img class=sp src=https://i.ibb.co/RLDKVfs/90.png alt><div class=advT><span>حصلت DunFin على إعلانية للامتثال في استراتيجيتها لذا مما يعمل خطوة حاسم...</span></div></div><nav class=m5 id=m5></nav><button class=cta>تداول</button><section class=hero id=hero><img class=on src=https://resource.dunfiny.org/uploads/20251031/6df0c468305e1cd399d7b4a06f84f067f9769e7d.jpg alt><img src=https://resource.dunfiny.org/uploads/20251031/95676d48ca0fc7b42ed472c16a93d30cd3bf8485.jpg alt></section><div class=dots id=dots><i class=on></i><i></i><i></i><i></i><i></i><i></i></div><section class=grid id=grid></section><section class=qs><div class=qh><div>زيادة 24 ساعة</div><div>أحدث سعر</div><div>اسم الاقتباس</div></div><div id=rows></div></section></div><nav class=nav id=nav></nav><div class=drw id=drw><div class=pn><div class=hd><div class=av></div><div class=info><div class=nk>05318352256</div><div class=id><img class=cpy src=https://tsdvxl.dunfinz.org/static/theme/light/icon/icon-copy.png alt>UID:21685074</div></div><div class=lv>LV0</div></div><div class=mode id=dk><img class=dki src=https://tsdvxl.dunfinz.org/static/icon/icon-dark.png alt><span>وضع الألوان</span></div><div id=mn></div></div></div><script>
let H=[...hero.children],D=[...dots.children],i=0,N=H.length;
let sw=()=>{if(N<2)return;H[i].classList.remove("on");i=(i+1)%N;H[i].classList.add("on");D.forEach((x,n)=>x.classList.toggle("on",n==i%D.length))};
let clk=()=>tm.textContent=new Date().toLocaleTimeString("en-GB",{hour12:0});
clk();setInterval(clk,1e3);setInterval(sw,3500);

// أسماء وأسعار أولية + اتجاه
let C=[
 ["BTC",61231.54,-0.72,"https://resource.dunfiny.org/uploads/20251011/79b6e300761520f7ad41856878999dbc1fafc137.png",2],
 ["ETH",1613.41,-1.45,"https://resource.dunfiny.org/uploads/20251011/27463866eb9fa6fe4b6d2bd2cd3d6fd88392cb43.png",2],
 ["BNB",583.4,-1.50,"https://resource.dunfiny.org/uploads/20251011/83c65e97df3ff99ddc360cbb4f00e0aab9b46157.png",2],
 ["XRP",1.092,-3.80,"https://resource.dunfiny.org/uploads/20251011/d25e8395244487e169b16cb9508e434ea1ea61dd.png",4],
 ["TRX",0.3213,-0.43,"https://resource.dunfiny.org/uploads/20251011/d0fe46ecc0664340d7027500d23cb6ee7b8de4f6.png",4],
 ["USDC",1.00069,0.03,"https://resource.dunfiny.org/uploads/20251012/ba18ca71aeb54d5d2b3f197fdf2bb9b7ecbacab7.png",5],
 ["SOL",62.62,-3.41,"https://resource.dunfiny.org/uploads/20251012/be5b706cd340c21bd9be3a3ce56647ec384d6624.png",2],
 ["TON",1.577,-7.13,"https://resource.dunfiny.org/uploads/20251012/fc655ce7df913b1e0b7cbb430cc5dfb686bf4a19.png",3]
];

// توليد مسار موجي ناعم (موجتين) عبر منحنى Catmull-Rom→Bezier
let genPts=(seed)=>{
 let pts=[],n=12,W=120,H=30;
 for(let k=0;k<n;k++){
  let x=(k/(n-1))*W;
  // موجتان جيبية + ضوضاء خفيفة
  let w=Math.sin(seed+k*0.9)*6 + Math.sin(seed*1.3+k*0.45)*4;
  let y=H/2 + w + (Math.random()-.5)*1.5;
  y=Math.max(3,Math.min(H-3,y));
  pts.push([x,y]);
 }
 return pts;
};
let toPath=(pts)=>{
 let d=`M${pts[0][0]} ${pts[0][1]}`;
 for(let i=0;i<pts.length-1;i++){
  let p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
  let c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
  let c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
  d+=` C${c1x.toFixed(1)} ${c1y.toFixed(1)},${c2x.toFixed(1)} ${c2y.toFixed(1)},${p2[0]} ${p2[1].toFixed(1)}`;
 }
 return d;
};

// رسم الشبكة (الكروت)
let buildGrid=()=>{
 grid.innerHTML=C.map((c,i)=>{
  let up=c[2]>=0,pts=genPts(i*1.7);
  return `<article class=coin data-i=${i}>
   <div class=pr><span>${c[0]}/USDT</span><span class='pct ${up?'up':''}'>${(up?'+':'')+c[2].toFixed(2)}%</span></div>
   <div class='pri ${up?'up':''}'>${c[1].toFixed(c[4])}</div>
   <svg class=spk viewBox='0 0 120 30' preserveAspectRatio=none><path class='${up?'up':''}' d='${toPath(pts)}'/></svg>
  </article>`;
 }).join("");
};
let buildRows=()=>{
 rows.innerHTML=C.map(c=>{
  let up=c[2]>=0;
  return `<div class=rw><div class='chg ${up?'up':''}'>${(up?'+':'')+c[2].toFixed(2)}%</div><div class=lp>${c[1].toFixed(c[4])}</div><div class=nm><img src='${c[3]}' alt><b>${c[0]}/USDT</b></div></div>`;
 }).join("");
};
buildGrid();buildRows();

// تحديث الأسعار ببطء كل 2.5 ثانية
let tick=()=>{
 C.forEach((c,i)=>{
  let vol=c[1]*0.0008*(Math.random()-.48); // تغير صغير
  let np=Math.max(c[1]*0.7, c[1]+vol);
  let pct=c[2]+(Math.random()-.5)*0.15;
  pct=Math.max(-15,Math.min(15,pct));
  c[1]=np; c[2]=pct;
  let up=pct>=0;
  let card=grid.querySelector(`[data-i='${i}']`);
  if(card){
   card.querySelector('.pri').textContent=np.toFixed(c[4]);
   card.querySelector('.pri').classList.toggle('up',up);
   let pe=card.querySelector('.pct');
   pe.textContent=(up?'+':'')+pct.toFixed(2)+'%';
   pe.classList.toggle('up',up);
   let path=card.querySelector('.spk path');
   path.setAttribute('d',toPath(genPts(i*1.7+Date.now()/3000)));
   path.classList.toggle('up',up);
  }
  let rw=rows.children[i];
  if(rw){
   rw.querySelector('.chg').textContent=(up?'+':'')+pct.toFixed(2)+'%';
   rw.querySelector('.chg').classList.toggle('up',up);
   rw.querySelector('.lp').textContent=np.toFixed(c[4]);
  }
 });
};
setInterval(tick,2500);

let ML=["https://tsdvxl.dunfinz.org/static/theme/light/menu/5.png","https://tsdvxl.dunfinz.org/static/theme/light/menu/4.png","https://tsdvxl.dunfinz.org/static/theme/light/menu/3.png","https://tsdvxl.dunfinz.org/static/theme/light/menu/2.png","https://tsdvxl.dunfinz.org/static/theme/light/menu/1.png"],
MD=["https://tsdvxl.dunfinz.org/static/theme/dark/menu/5.png","https://tsdvxl.dunfinz.org/static/theme/dark/menu/4.png","https://tsdvxl.dunfinz.org/static/theme/dark/menu/3.png","https://tsdvxl.dunfinz.org/static/theme/dark/menu/2.png","https://tsdvxl.dunfinz.org/static/theme/dark/menu/1.png"],
MN=["مفصل","نقل","تبادل","سحب","شحن"],
MSG1="https://tsdvxl.dunfinz.org/static/theme/light/icon/icon-message.png",MSG2="https://tsdvxl.dunfinz.org/static/theme/dark/icon/icon-message.png",
LS1="https://tsdvxl.dunfinz.org/static/theme/light/icon/icon-list.png",LS2="https://tsdvxl.dunfinz.org/static/theme/dark/icon/icon-list.png";
let mk=()=>{let d=document.documentElement.classList.contains("dk"),A=d?MD:ML;m5.innerHTML=MN.map((n,i)=>`<a href=#><img src='${A[i]}' alt><div>${n}</div></a>`).join("");msgI.src=d?MSG2:MSG1;lsI.src=d?LS2:LS1};
mk();

let t=[["شخصي","https://tsdvxl.dunfinz.org/static/tabbar/personal.png","https://tsdvxl.dunfinz.org/static/tabbar/personal-s.png"],["عقد","https://tsdvxl.dunfinz.org/static/tabbar/contract.png","https://tsdvxl.dunfinz.org/static/tabbar/contract-s.png"],["تداول","https://tsdvxl.dunfinz.org/static/tabbar/trade.png","https://tsdvxl.dunfinz.org/static/tabbar/trade-s.png"],["سوق","https://tsdvxl.dunfinz.org/static/tabbar/market.png","https://tsdvxl.dunfinz.org/static/tabbar/market-s.png"],["الرئيسية","https://tsdvxl.dunfinz.org/static/tabbar/home.png","https://tsdvxl.dunfinz.org/static/tabbar/home-s.png"]];
nav.innerHTML=t.map((a,n)=>`<a href=# class='${n==4?"on":""}'><img src='${n==4?a[2]:a[1]}' alt><span>${a[0]}</span></a>`).join("");
nav.onclick=e=>{let a=e.target.closest("a");if(!a)return;e.preventDefault();[...nav.children].forEach((x,n)=>{x.classList.toggle("on",x==a);x.querySelector("img").src=t[n][x==a?2:1]})};

let M=[["مركز الشهادات","icon-my-1"],["مركز الانشطة","icon-my-3"],["دعوة","icon-my-4"],["خدمة العملاء","icon-my-5"],["فريق","icon-my-10"],["مركز المساعدة","icon-my-6"],["اعدادات","icon-my-7"],["تنزيل","icon-my-8"],["تبديل اللغة","icon-my-9"]];
mn.innerHTML=M.map(m=>`<div class=mi><img src='https://tsdvxl.dunfinz.org/static/icon/${m[1]}.png' alt><span class=tx>${m[0]}</span><span class=ar>›</span></div>`).join("");
lsI.onclick=()=>drw.classList.add("op");
drw.onclick=e=>e.target==drw&&drw.classList.remove("op");
dk.onclick=()=>{document.documentElement.classList.toggle("dk");mk()}
</script>
