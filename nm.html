mentById("pw").addEventListener("keypress",e=>{if(e.key==="Enter")lg()});if(auth)show();function init(){const s=document.createElement("script");s.type="module";s.textContent=`import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,doc,setDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";const fc={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(fc),db=getFirestore(app),list=document.getElementById("list"),main=document.getElementById("main"),cnt=document.getElementById("cnt"),srch=document.getElementById("srch");let users=[],cur=null,unsub=null;const SND='<svg viewBox=\\"0 0 24 24\\" fill=\\"none\\" stroke=\\"currentColor\\" stroke-width=\\"2\\" stroke-linecap=\\"round\\" stroke-linejoin=\\"round\\" width=\\"20\\" height=\\"20\\"><line x1=\\"22\\" y1=\\"2\\" x2=\\"11\\" y2=\\"13\\"/><polygon points=\\"22 2 15 22 11 13 2 9 22 2\\"/></svg>';const CLP='<svg viewBox=\\"0 0 24 24\\" fill=\\"none\\" stroke=\\"currentColor\\" stroke-width=\\"2\\" stroke-linecap=\\"round\\" stroke-linejoin=\\"round\\" width=\\"20\\" height=\\"20\\"><path d=\\"M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48\\"/></svg>';function fmt(t){if(!t)return"";const d=t.toDate?t.toDate():new Date(),n=new Date();return d.toDateString()===n.toDateString()?d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"):(d.getMonth()+1)+"/"+d.getDate()}function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}function render(){const f=srch.value.toLowerCase(),fl=users.filter(u=>(u.name||"").toLowerCase().includes(f)||(u.uid||"").toLowerCase().includes(f));list.innerHTML="";cnt.textContent=fl.length;fl.forEach(u=>{const d=document.createElement("div");d.className="usr"+(cur===u.uid?" active":""),d.innerHTML='<div class=\\"avt\\">'+esc((u.name||"؟").charAt(0).toUpperCase())+'</div><div class=\\"uinfo\\"><div class=\\"n\\">'+esc(u.name||"مستخدم")+'</div><div class=\\"l\\">'+esc(u.lastMessage||"لا توجد رسائل")+'</div></div><div class=\\"umeta\\">'+fmt(u.lastTime)+'</div>';d.onclick=()=>open(u);list.appendChild(d)})}srch.addEventListener("input",render);onSnapshot(query(collection(db,"chats"),orderBy("lastTime","desc")),s=>{users=[];s.forEach(x=>users.push({...x.data(),uid:x.id}));render()});function open(u){cur=u.uid;render();if(unsub)unsub();const mref=collection(db,"chats",u.uid,"messages"),uref=doc(db,"chats",u.uid);main.className="main show";main.innerHTML='<div class=\\"mhead\\"><span class=\\"bk\\" onclick=\\"bk()\\">←</span><div class=\\"avt\\">'+esc((u.name||"؟").charAt(0).toUpperCase())+'</div><div class=\\"info\\"><div class=\\"n\\">'+esc(u.name||"مستخدم")+'</div><div class=\\"id\\">'+esc(u.uid)+'</div></div></div><div class=\\"mchat\\" id=\\"mc\\"></div><div class=\\"mbar\\"><button class=\\"snd\\" id=\\"asnd\\">'+SND+'</button><input type=\\"text\\" id=\\"atxt\\" placeholder=\\"اكتب ردك...\\" autocomplete=\\"off\\"><label>'+CLP+'<input type=\\"file\\" id=\\"aimg\\" accept=\\"image/*\\"></label></div>';const mc=document.getElementById("mc"),atxt=document.getElementById("atxt"),aimg=document.getElementById("aimg"),asnd=document.getElementById("asnd");unsub=onSnapshot(query(mref,orderBy("createdAt","asc")),s=>{mc.innerHTML="";s.forEach(x=>{const m=x.data(),d=document.createElement("div");d.className="m "+(m.from==="user"?"user":"admin");if(m.type==="image")d.innerHTML='<img src=\\"'+m.content+'\\"><span class=\\"t\\">'+fmt(m.createdAt)+'</span>';else d.innerHTML=esc(m.content)+'<span class=\\"t\\">'+fmt(m.createdAt)+'</span>';mc.appendChild(d)});mc.scrollTop=mc.scro
