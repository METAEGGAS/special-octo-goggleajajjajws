<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#000000"><title>لوحة التحكم - Sorvego</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;background:#f0f2f5}body{display:flex;direction:rtl}.side{width:340px;background:#fff;border-left:1px solid #ddd;display:flex;flex-direction:column;flex-shrink:0}.shead{padding:14px 16px;background:#f7f7f7;border-bottom:1px solid #e0e0e0;font-weight:600;font-size:17px;display:flex;justify-content:space-between;align-items:center}.shead .cnt{background:#e53935;color:#fff;font-size:12px;padding:2px 8px;border-radius:10px}.search{padding:8px 12px;background:#fff;border-bottom:1px solid #eee}.search input{width:100%;padding:8px 12px;border:none;background:#f0f2f5;border-radius:18px;outline:none;font-size:14px}.list{flex:1;overflow-y:auto}.usr{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:.15s;gap:12px}.usr:hover{background:#f5f5f5}.usr.active{background:#e8f0fe}.avt{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#e53935,#b71c1c);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;flex-shrink:0}.uinfo{flex:1;min-width:0;overflow:hidden}.uinfo .n{font-weight:600;font-size:15px;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.uinfo .l{font-size:13px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.umeta{text-align:left;font-size:11px;color:#888;flex-shrink:0}.main{flex:1;display:flex;flex-direction:column;background:#efeae2;background-image:linear-gradient(rgba(239,234,226,.95),rgba(239,234,226,.95)),url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><circle cx='20' cy='20' r='1' fill='%23ccc'/></svg>")}.mhead{padding:12px 18px;background:#f7f7f7;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:12px;min-height:62px}.mhead .avt{width:40px;height:40px;font-size:16px}.mhead .info .n{font-weight:600;font-size:16px}.mhead .info .id{font-size:12px;color:#777;direction:ltr;text-align:right}.mchat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:8px}.m{max-width:60%;padding:8px 12px;border-radius:10px;font-size:14px;word-wrap:break-word;line-height:1.5;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.08)}.m.user{background:#fff;align-self:flex-start;border-top-right-radius:2px}.m.admin{background:#dcf8c6;align-self:flex-end;border-top-left-radius:2px}.m img{max-width:280px;border-radius:6px;display:block;cursor:pointer}.m .t{display:block;font-size:10px;color:#888;text-align:left;margin-top:4px;direction:ltr}.mbar{display:flex;gap:8px;padding:12px;background:#f0f0f0;align-items:center}.mbar input[type=text]{flex:1;border:none;border-radius:22px;padding:11px 16px;font-size:15px;outline:none;background:#fff}.mbar button{background:#e53935;color:#fff;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px}.mbar label{background:#fff;color:#555;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}.mbar input[type=file]{display:none}.empty{margin:auto;color:#888;font-size:16px;text-align:center}.empty .ic{font-size:60px;opacity:.4;margin-bottom:10px}.unread{background:#e53935;color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block}@media(max-width:700px){.side{width:100%;position:absolute;height:100%;z-index:10}.side.hide{display:none}.main.show{display:flex}.main{display:none}.bk{display:inline-block;margin-left:8px;cursor:pointer;font-size:22px}}</style></head><body><div class="side" id="side"><div class="shead"><span>الدردشات</span><span class="cnt" id="cnt">0</span></div><div class="search"><input type="text" id="srch" placeholder="بحث..."></div><div class="list" id="list"></div></div><div class="main" id="main"><div class="empty" id="emp"><div class="ic">💬</div>اختر محادثة لبدء الرد</div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";const fc={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(fc);const db=getFirestore(app);const list=document.getElementById("list");const main=document.getElementById("main");const cnt=document.getElementById("cnt");const srch=document.getElementById("srch");let users=[];let cur=null;let unsub=null;function fmt(t){if(!t)return"";const d=t.toDate?t.toDate():new Date();const n=new Date();const sd=d.toDateString()===n.toDateString();if(sd)return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");return(d.getMonth()+1)+"/"+d.getDate()}function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}function render(){const f=srch.value.toLowerCase();const fl=users.filter(u=>(u.name||"").toLowerCase().includes(f)||(u.uid||"").toLowerCase().includes(f));list.innerHTML="";cnt.textContent=fl.length;fl.forEach(u=>{const d=document.createElement("div");d.className="usr"+(cur===u.uid?" active":"");const ini=(u.name||"؟").charAt(0).toUpperCase();d.innerHTML='<div class="avt">'+esc(ini)+'</div><div class="uinfo"><div class="n">'+esc(u.name||"مستخدم")+'</div><div class="l">'+esc(u.lastMessage||"لا توجد رسائل")+'</div></div><div class="umeta">'+fmt(u.lastTime)+'</div>';d.onclick=()=>open(u);list.appendChild(d)})}srch.addEventListener("input",render);onSnapshot(query(collection(db,"chats"),orderBy("lastTime","desc")),s=>{users=[];s.forEach(x=>users.push({...x.data(),uid:x.id}));render()});function open(u){cur=u.uid;render();if(unsub)unsub();const mref=collection(db,"chats",u.uid,"messages");const uref=doc(db,"chats",u.uid);main.className="main show";main.innerHTML='<div class="mhead"><span class="bk" onclick="bk()">←</span><div class="avt">'+esc((u.name||"؟").charAt(0).toUpperCase())+'</div><div class="info"><div class="n">'+esc(u.name||"مستخدم")+'</div><div class="id">'+esc(u.uid)+'</div></div></div><div class="mchat" id="mc"></div><div class="mbar"><label>📎<input type="file" id="aimg" accept="image/*"></label><input type="text" id="atxt" placeholder="اكتب ردك..." autocomplete="off"><button id="asnd">➤</button></div>';const mc=document.getElementById("mc");const atxt=document.getElementById("atxt");const aimg=document.getElementById("aimg");const asnd=document.getElementById("asnd");unsub=onSnapshot(query(mref,orderBy("createdAt","asc")),s=>{mc.innerHTML="";s.forEach(x=>{const m=x.data();const d=document.createElement("div");d.className="m "+(m.from==="user"?"user":"admin");if(m.type==="image"){d.innerHTML='<img src="'+m.content+'"><span class="t">'+fmt(m.createdAt)+'</span>'}else{d.innerHTML=esc(m.content)+'<span class="t">'+fmt(m.createdAt)+'</span>'}mc.appendChild(d)});mc.scrollTop=mc.scrollHeight});async function snd(c,ty){if(!c)return;await addDoc(mref,{from:"admin",content:c,type:ty,createdAt:serverTimestamp()});setDoc(uref,{lastMessage:ty==="image"?"📷 صورة":c,lastTime:serverTimestamp()},{merge:!0})}asnd.onclick=()=>{const v=atxt.value.trim();if(!v)return;snd(v,"text");atxt.value=""};atxt.addEventListener("keypress",e=>{if(e.key==="Enter")asnd.click()});aimg.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;if(f.size>800000){alert("الصورة كبيرة جداً");return}const r=new FileReader();r.onload=ev=>snd(ev.target.result,"image");r.readAsDataURL(f);aimg.value=""})}window.bk=()=>{main.className="main";main.innerHTML='<div class="empty"><div class="ic">💬</div>اختر محادثة</div>';cur=null;render()};</script></body></html>
