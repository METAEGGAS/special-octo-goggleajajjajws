<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>تبادل</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;font-family:Tahoma,Arial,sans-serif;background:#000;color:#fff}body{--p:#121212;--l:#232323;--m:#777;--g1:#f2c821;--g2:#fff0a8;--g3:#ffd92f}.pg{position:fixed;inset:0;background:#000}.app{height:100%;max-width:430px;margin:auto;padding:10px 14px 14px;display:flex;flex-direction:column}.top{height:44px;position:relative;display:flex;align-items:center;justify-content:space-between}.ttl{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:20px}.bk,.rc,.sw{border:0;cursor:pointer;background:none;padding:0}.bk{position:absolute;left:0;top:8px;width:28px;height:28px;color:#fff;font-size:28px;line-height:1;transform:scaleX(-1)}.rc{width:28px;height:28px;background:url(https://tsdvxl.dunfinz.org/static/my/dark/record.png) center/24px 24px no-repeat}.sec{margin:12px 4px 8px;font-size:20px}.sel,.bx,.ok{width:100%}.sel{height:54px;background:var(--p);border:1px solid var(--l);border-radius:10px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;color:#fff}.ar{width:12px;height:8px;background:url(https://i.ibb.co/Lzv0gB9P/91.png) center/contain no-repeat;display:inline-block}.mid{position:relative;margin-top:10px}.bx{height:120px;background:var(--p);border:1px solid var(--l);border-radius:14px;position:relative}.gap{height:18px}.tt1{position:absolute;left:18px;top:16px;font-size:18px}.tt2{position:absolute;right:18px;top:16px;font-size:17px}.coin{position:absolute;left:18px;bottom:24px;display:flex;align-items:center;gap:6px;font-size:20px;transform:translateZ(0)}.ph{position:absolute;right:18px;top:42px;color:var(--m);font-size:15px}.mx{position:absolute;right:18px;bottom:24px;color:#f2c92c;font-size:18px}.sw{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;background:url(https://tsdvxl.dunfinz.org/static/my/big-change.png) center/contain no-repeat;z-index:3}.rate{padding:12px 0 10px;text-align:center;color:#d7b46d;font-size:15px}.rate b{font-weight:500;direction:ltr;display:inline-block}.ok{height:50px;border-radius:8px;border:1px solid #d8b63b;background:linear-gradient(90deg,var(--g1),var(--g2) 50%,var(--g3));color:#111;font-size:18px;font-weight:700}.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:20}.ov.s{opacity:1;pointer-events:auto}.sh{position:fixed;left:0;right:0;bottom:-220px;max-width:430px;margin:auto;background:#121212;border-top:1px solid #232323;border-radius:22px 22px 0 0;transition:.2s;z-index:21}.sh.s{bottom:0}.sh .h{height:72px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #232323;font-size:20px}.sh .i{height:68px;display:flex;align-items:center;justify-content:center;color:#8c8c8c;font-size:18px;cursor:pointer}.his{display:none}.his.s{display:block}.empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}.empty img{width:92px;height:92px;object-fit:contain}.empty div{color:#9a9a9a;font-size:20px}.fly{position:fixed;z-index:99;pointer-events:none;display:flex;align-items:center;gap:6px;font-size:20px;color:#fff;transition:transform .42s cubic-bezier(.22,.8,.22,1),opacity .42s}.sel:active,.ok:active,.sw:active,.rc:active,.bk:active,.sh .i:active{filter:brightness(.97)}</style></head><body><div class="pg" id="main"><div class="app"><div class="top"><button class="rc" id="openHis" aria-label="سجل"></button><div class="ttl">تبادل</div><button class="bk" aria-label="رجوع">›</button></div><div class="sec">اختر الحساب</div><button class="sel" id="openSheet"><span class="ar"></span><span id="acc">تمويل الحساب</span></button><div class="mid"><div class="bx"><div class="tt1">استهلك</div><div class="tt2">متوفر:0</div><div class="coin" id="coin1"><span id="c1">BTC</span><span class="ar"></span></div><div class="ph">أدخل الكمية القصوى</div><div class="mx">ماكس</div></div><div class="gap"></div><button class="sw" id="swap" aria-label="تبديل"></button><div class="bx"><div class="tt1">احصل على</div><div class="coin" id="coin2"><span id="c2">USDT</span><span class="ar"></span></div></div></div><div class="rate"><span>سعر:</span> <b>1:61758.494783</b> <span id="r">USDT</span></div><button class="ok">تأكيد</button></div></div><div class="pg his" id="his"><div class="app"><div class="top"><div></div><div class="ttl">سجل الصرف</div><button class="bk" id="backHis" aria-label="عودة">›</button></div><div class="empty"><img src="https://tsdvxl.dunfinz.org/static/theme/dark/icon/empty.png" alt=""><div>لا يوجد بيانات متاحة</div></div></div></div><div class="ov" id="ov"></div><div class="sh" id="sh"><div class="h">تمويل الحساب</div><div class="i" data-v="حساب تداول">حساب تداول</div></div><script>let $=e=>document.querySelector(e),sh=$("#sh"),ov=$("#ov"),acc=$("#acc"),c1=$("#c1"),c2=$("#c2"),r=$("#r"),busy=0;function os(){sh.classList.add("s");ov.classList.add("s")}function cs(){sh.classList.remove("s");ov.classList.remove("s")}$("#openSheet").onclick=os;ov.onclick=cs;sh.querySelector(".i").onclick=e=>{acc.textContent=e.target.dataset.v;cs()};$("#openHis").onclick=()=>{$("#main").style.display="none";$("#his").classList.add("s")};$("#backHis").onclick=()=>{$("#his").classList.remove("s");$("#main").style.display="block"};function mk(el){let r=el.getBoundingClientRect(),n=el.cloneNode(!0);n.classList.add("fly");n.style.left=r.left+"px";n.style.top=r.top+"px";n.style.width=r.width+"px";n.style.height=r.height+"px";document.body.appendChild(n);return[n,r]}$("#swap").onclick=()=>{if(busy)return;busy=1;let a=$("#coin1"),b=$("#coin2"),[fa,ra]=mk(a),[fb,rb]=mk(b),dx1=rb.left-ra.left,dy1=rb.top-ra.top,dx2=ra.left-rb.left,dy2=ra.top-rb.top;a.style.opacity=b.style.opacity=0;requestAnimationFrame(()=>{fa.style.transform=`translate(${dx1}px,${dy1}px)`;fb.style.transform=`translate(${dx2}px,${dy2}px)`});setTimeout(()=>{let x=c1.textContent,y=c2.textContent;c1.textContent=y;c2.textContent=x;r.textContent=c2.textContent;fa.remove();fb.remove();a.style.opacity=b.style.opacity=1;busy=0},430)};</script></body></html>
