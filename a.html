<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>نقل</title><style>:root{--bg:#000;--card:#070707;--bd:#171717;--tx:#fff;--mut:#8e8e8e;--yl:#f1d033;--rec:url(https://tsdvxl.dunfinz.org/static/my/dark/record.png);--empty:url(https://tsdvxl.dunfinz.org/static/theme/dark/icon/empty.png);--arr:url(https://i.ibb.co/Lzv0gB9P/91.png)}@media(prefers-color-scheme:light){:root{--bg:#f7f7f7;--card:#fff;--bd:#dcdcdc;--tx:#111;--mut:#7a7a7a;--yl:#e0b600;--rec:url(https://tsdvxl.dunfinz.org/static/my/light/record.png);--empty:url(https://tsdvxl.dunfinz.org/static/theme/light/icon/empty.png)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font:500 16px/1.35 system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;overflow:hidden}button,input{font:inherit}body{display:flex;justify-content:center}.app{position:relative;width:100%;max-width:700px;height:100dvh;background:var(--bg);overflow:hidden}.view{position:absolute;inset:0;padding:6px 16px 24px;background:var(--bg)}.top{position:relative;height:42px;display:flex;align-items:center;justify-content:center;font-size:17px}.back,.rec{position:absolute;top:4px;width:34px;height:34px;border:0;background:none;padding:0;cursor:pointer}.back{left:0;color:var(--tx);font-size:30px;line-height:34px}.rec{right:0;background-image:var(--rec);background-repeat:no-repeat;background-position:center;background-size:22px}.head{font-size:20px;font-weight:700;margin:10px 0 12px}.label{font-size:17px;margin:16px 2px 10px}.meta{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 10px;font-size:17px}.meta small{color:var(--mut);font-size:15px}.box,.ipt{height:56px;border:1px solid var(--bd);border-radius:10px;background:var(--card)}.box{display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer}.box span{font-size:17px}.arr{width:14px;height:14px;background-image:var(--arr);background-repeat:no-repeat;background-position:center;background-size:contain;flex:none}.in{position:relative}.ipt{width:100%;outline:0;color:var(--tx);padding:0 70px 0 16px}.ipt::placeholder{color:#676767}.all{position:absolute;left:14px;top:50%;transform:translateY(-50%);border:0;background:none;color:var(--yl);font-size:17px;cursor:pointer}.ok{position:absolute;left:16px;right:16px;bottom:38px;height:58px;border-radius:10px;border:1px solid #b89f22;background:linear-gradient(90deg,#efd22d,#e2bd17,#f2d83a);color:#111;font-size:22px;font-weight:700;cursor:pointer}.sheet-open .ok{opacity:.58}.mask{position:absolute;inset:0;background:rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:.22s}.sheet{position:absolute;left:0;right:0;bottom:-260px;background:#0d0d0f;border-top:1px solid #222;border-radius:18px 18px 0 0;transition:.22s;padding:6px 0 calc(10px + env(safe-area-inset-bottom))}@media(prefers-color-scheme:light){.sheet{background:#fff;border-color:#ddd}}.sheet button{width:100%;height:58px;border:0;border-top:1px solid rgba(255,255,255,.06);background:none;color:#8f8f8f;font-size:22px;cursor:pointer}.sheet button.on{color:#fff}@media(prefers-color-scheme:light){.sheet button{border-top:1px solid rgba(0,0,0,.06)}.sheet button.on{color:#111}}.sheet-open .mask{opacity:1;pointer-events:auto}.sheet-open .sheet{bottom:0}.hide{display:none!important}.empty-wrap{position:absolute;top:108px;left:0;right:0;text-align:center;color:#777}.empty-ico{width:72px;height:72px;margin:0 auto 10px;background-image:var(--empty);background-repeat:no-repeat;background-position:center;background-size:contain}.empty-t{font-size:18px;color:#7c7c7c}</style></head><body><div class="app" id="app"><section class="view" id="main"><div class="top"><button class="back" aria-label="رجوع">‹</button><div>نقل</div><button class="rec" id="openRec" aria-label="سجل"></button></div><div class="head">نقل حساب خارجي</div><div class="box" id="fromBox"><span id="fromTxt">تمويل الحساب</span><i class="arr"></i></div><div class="label">نقل إلى الحساب</div><div class="box" id="toBox"><span id="toTxt">حساب تداول</span><i class="arr"></i></div><div class="meta"><div>اختر العملة</div><small>متاح:0</small></div><div class="box" id="curBox"><span id="curTxt">USDT</span><i class="arr"></i></div><div class="label">اختر الكمية</div><div class="in"><input class="ipt" id="amt" inputmode="decimal" placeholder="يرجى إدخال الكمية المراد تحويلها"><button class="all" type="button">الكل</button></div><button class="ok">تأكيد</button></section><section class="view hide" id="recView"><div class="top"><button class="back" id="closeRec" aria-label="رجوع">‹</button><div>سجل التحويل</div></div><div class="empty-wrap"><div class="empty-ico"></div><div class="empty-t">لا توجد بيانات بعد</div></div></section><div class="mask" id="mask"></div><div class="sheet" id="sheet"><button data-cur="USDT">USDT</button><button data-cur="BTC">BTC</button><button data-cur="USDC" class="on">USDC</button></div></div><script>let a=document.getElementById('app'),m=document.getElementById('main'),r=document.getElementById('recView'),f=document.getElementById('fromTxt'),t=document.getElementById('toTxt'),c=document.getElementById('curTxt'),amt=document.getElementById('amt'),sheet=document.getElementById('sheet'),mask=document.getElementById('mask');function openSheet(){f.textContent='حساب تداول';t.textContent='تمويل الحساب';c.textContent='USDC';amt.value='800';[...sheet.querySelectorAll('button')].forEach(x=>x.classList.toggle('on',x.dataset.cur===c.textContent));a.classList.add('sheet-open')}function closeSheet(){a.classList.remove('sheet-open')}document.getElementById('curBox').onclick=openSheet;mask.onclick=closeSheet;[...sheet.querySelectorAll('button')].forEach(b=>b.onclick=()=>{c.textContent=b.dataset.cur;[...sheet.querySelectorAll('button')].forEach(x=>x.classList.toggle('on',x===b));closeSheet()});document.getElementById('openRec').onclick=()=>{m.classList.add('hide');r.classList.remove('hide');closeSheet()};document.getElementById('closeRec').onclick=()=>{r.classList.add('hide');m.classList.remove('hide')};</script></body></html>
