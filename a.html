<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>نقل</title><style>:root{--bg:#000;--card:#080808;--bd:#1b1b1b;--tx:#fff;--mut:#bdbdbd;--yl:#f4d63a;--rec:url(https://tsdvxl.dunfinz.org/static/my/dark/record.png);--empty:url(https://tsdvxl.dunfinz.org/static/theme/dark/icon/empty.png);--arr:url(https://i.ibb.co/Lzv0gB9P/91.png)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font:500 18.4px/1.35 "Noto Sans Arabic",system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;overflow:hidden}button,input{font:inherit}body{display:flex;justify-content:center}.app{position:relative;width:100%;max-width:720px;height:100dvh;background:#000;overflow:hidden}.v{position:absolute;inset:0;padding:6px 16px 24px;background:#000}.top{position:relative;height:42px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff}.back,.rec{position:absolute;top:4px;width:34px;height:34px;border:0;background:none;padding:0;cursor:pointer}.back{left:0;color:#fff;font-size:30px;line-height:34px}.rec{right:0;background:var(--rec) center/22px no-repeat}.h{font-size:23px;font-weight:700;margin:10px 0 12px;text-align:left;cursor:pointer}.lb,.meta{font-size:19px;color:#fff;text-align:left}.lb{margin:16px 2px 10px}.meta{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 10px}.meta small{color:var(--mut);font-size:17px}.box,.ipt{height:58px;border:1px solid var(--bd);border-radius:10px;background:var(--card)}.box{display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;direction:ltr}.box span{font-size:19px;color:#fff}.arr{width:14px;height:14px;background:var(--arr) center/contain no-repeat;flex:none}.in{position:relative}.ipt{width:100%;outline:0;color:#fff;background:var(--card);padding:0 74px 0 16px;border:1px solid var(--bd);text-align:left;direction:ltr}.ipt::placeholder{color:#7f7f7f;opacity:1}.all{position:absolute;left:14px;top:50%;transform:translateY(-50%);border:0;background:none;color:var(--yl);font-size:19px;cursor:pointer}.ok{position:absolute;left:16px;right:16px;bottom:38px;height:58px;border-radius:10px;border:1px solid #b89f22;background:linear-gradient(90deg,#efd22d,#e2bd17,#f2d83a);color:#111;font-size:24px;font-weight:800;cursor:pointer}.sheet-open .ok{opacity:.58}.mask{position:absolute;inset:0;background:rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:.2s}.sheet{position:absolute;left:0;right:0;bottom:-280px;background:#0d0d0f;border-top:1px solid #222;border-radius:18px 18px 0 0;transition:.2s;padding:6px 0 calc(10px + env(safe-area-inset-bottom));z-index:5}.sheet button{width:100%;height:58px;border:0;border-top:1px solid rgba(255,255,255,.06);background:none;color:#9e9e9e;font-size:23px;cursor:pointer}.sheet button.on{color:#fff}.sheet-open .mask{opacity:1;pointer-events:auto;z-index:4}.sheet-open .sheet.show{bottom:0}.hide{display:none!important}.empty{position:absolute;top:108px;left:0;right:0;text-align:center}.ei{width:74px;height:74px;margin:0 auto 10px;background:var(--empty) center/contain no-repeat}.et{font-size:20px;color:#8b8b8b}</style></head><body><div class="app" id="a"><section class="v" id="m"><div class="top"><button class="back" aria-label="رجوع">‹</button><div>نقل</div><button class="rec" id="or" aria-label="سجل"></button></div><div class="h" id="ext">نقل حساب خارجي</div><div class="box" id="fb"><span id="f">تمويل الحساب</span><i class="arr"></i></div><div class="lb">نقل إلى الحساب</div><div class="box" id="tb"><span id="t">حساب تداول</span><i class="arr"></i></div><div class="meta"><div>اختر العملة</div><small>متاح:0</small></div><div class="box" id="cb"><span id="c">USDT</span><i class="arr"></i></div><div class="lb">اختر الكمية</div><div class="in"><input class="ipt" id="amt" inputmode="decimal" placeholder="يرجى إدخال الكمية المراد تحويلها"><button class="all" type="button">الكل</button></div><button class="ok">تأكيد</button></section><section class="v hide" id="r"><div class="top"><button class="back" id="cr" aria-label="رجوع">‹</button><div>سجل التحويل</div></div><div class="empty"><div class="ei"></div><div class="et">لا توجد بيانات بعد</div></div></section><div class="mask" id="mk"></div><div class="sheet" id="s1"><button data-v="حساب تداول">حساب تداول</button><button data-v="تمويل الحساب">تمويل الحساب</button></div><div class="sheet" id="s2"><button data-v="USDT">USDT</button><button data-v="BTC">BTC</button><button data-v="USDC" class="on">USDC</button></div></div><script>let a=document.getElementById('a'),m=document.getElementById('m'),r=document.getElementById('r'),mk=document.getElementById('mk'),s1=document.getElementById('s1'),s2=document.getElementById('s2'),f=document.getElementById('f'),t=document.getElementById('t'),c=document.getElementById('c'),amt=document.getElementById('amt');function cls(){a.classList.remove('sheet-open');s1.classList.remove('show');s2.classList.remove('show')}function op(s){cls();a.classList.add('sheet-open');s.classList.add('show')}document.getElementById('ext').onclick=()=>op(s1);document.getElementById('cb').onclick=()=>{f.textContent='حساب تداول';t.textContent='تمويل الحساب';c.textContent='USDC';amt.value='800';[...s2.querySelectorAll('button')].forEach(x=>x.classList.toggle('on',x.dataset.v===c.textContent));op(s2)};mk.onclick=cls;[...s1.querySelectorAll('button')].forEach(b=>b.onclick=()=>{f.textContent=b.dataset.v;t.textContent=b.dataset.v==='حساب تداول'?'تمويل الحساب':'حساب تداول';cls()});[...s2.querySelectorAll('button')].forEach(b=>b.onclick=()=>{c.textContent=b.dataset.v;[...s2.querySelectorAll('button')].forEach(x=>x.classList.toggle('on',x===b));cls()});document.getElementById('or').onclick=()=>{m.classList.add('hide');r.classList.remove('hide');cls()};document.getElementById('cr').onclick=()=>{r.classList.add('hide');m.classList.remove('hide')}</script></body></html>
