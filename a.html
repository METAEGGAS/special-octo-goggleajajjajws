<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>نقل</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:"Noto Sans Arabic",sans-serif}html,body{height:100%;overflow:hidden}body{background:#000;color:#fff;direction:rtl;transition:background .3s}body.light{background:#fff;color:#000}.scr{position:fixed;inset:0;display:none;flex-direction:column;background:inherit}.scr.active{display:flex}.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px;position:relative;height:56px;flex-shrink:0}.back{font-size:22px;cursor:pointer;width:24px;color:inherit;background:none;border:none;font-weight:300;text-align:right}.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:400}.ri{width:22px;height:22px;cursor:pointer;opacity:.85}.body{flex:1;padding:0 18px;overflow-y:auto}.lbl{font-size:13px;margin:18px 0 8px;color:#bbb;font-weight:400}body.light .lbl{color:#333}.fld{background:#111;border-radius:8px;padding:15px 16px;display:flex;justify-content:space-between;align-items:center;font-size:14px;cursor:pointer}body.light .fld{background:#f5f5f5}.fld .arr{color:#888;font-size:10px}.amt{position:relative}.amt input{width:100%;background:#111;border:none;border-radius:8px;padding:15px 16px;color:inherit;font-size:14px;outline:none;direction:ltr;text-align:left}body.light .amt input{background:#f5f5f5;color:#000}.all{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#d4a82a;font-size:13px;cursor:pointer}.av{position:absolute;left:0;top:0;font-size:12px;color:#888;margin:18px 0 8px}body.light .av{color:#666}.lw{position:relative}.btn{margin:auto 18px 40px;background:#6e5817;color:#a89060;padding:15px;border-radius:8px;text-align:center;font-size:15px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px}.btn.act{background:#f5d020;color:#000}.btn .sp{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.empty{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:90px}.empty img{width:70px;height:70px;opacity:.4;margin-bottom:12px}.empty p{font-size:12px;color:#666}.sbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:10}.sbg.a{display:block}.sh{position:fixed;left:0;right:0;bottom:0;background:#1c1c1c;border-radius:14px 14px 0 0;padding:6px 0 18px;z-index:11;transform:translateY(100%);transition:transform .25s}body.light .sh{background:#fff}.sh.a{transform:translateY(0)}.sh .o{padding:16px 24px;text-align:center;font-size:15px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}.sh .o.s{color:#fff;font-weight:600}body.light .sh .o.s{color:#000}.sh .o .ci{width:12px;height:12px;background:#f5d020;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);display:none}.sh .o.s .ci{display:inline-block}.tt{position:fixed;top:14px;right:54px;background:#222;color:#fff;border:none;padding:4px 8px;border-radius:5px;font-size:10px;cursor:pointer;z-index:20;opacity:.6}body.light .tt{background:#eee;color:#000}</style></head><body>
<button class="tt" onclick="document.body.classList.toggle('light');u()">🌓</button>

<div class="scr active" id="s1">
<div class="hdr"><button class="back" onclick="g('s3')">‹</button><div class="title">نقل</div><img class="ri" id="r1" src="https://tsdvxl.dunfinz.org/static/my/dark/record.png" onclick="g('s3')"></div>
<div class="body">
<div class="lbl">نقل حساب خارجي</div>
<div class="fld"><span>حساب تداول</span><span class="arr">▼</span></div>
<div class="lbl">نقل إلى الحساب</div>
<div class="fld"><span>تمويل الحساب</span><span class="arr">▼</span></div>
<div class="lw"><div class="lbl">اختر العملة</div><span class="av">متاح:0</span></div>
<div class="fld" onclick="os()"><span id="cs">USDC</span><span class="arr">▼</span></div>
<div class="lbl">اختر الكمية</div>
<div class="amt"><input type="text" value="800"><span class="all">الكل</span></div>
</div>
<button class="btn" id="cb"><span class="sp"></span>تأكيد</button>
</div>

<div class="scr" id="s3">
<div class="hdr"><button class="back" onclick="g('s1')">‹</button><div class="title">سجل التحويل</div><div style="width:22px"></div></div>
<div class="empty"><img id="em" src="https://tsdvxl.dunfinz.org/static/theme/dark/icon/empty.png"><p>لا توجد بيانات بعد</p></div>
</div>

<div class="sbg" id="sb" onclick="cs2()"></div>
<div class="sh" id="sh">
<div class="o" data-c="USDT"><span class="ci"></span>USDT</div>
<div class="o" data-c="BTC"><span class="ci"></span>BTC</div>
<div class="o s" data-c="USDC"><span class="ci"></span>USDC</div>
</div>

<script>
function g(i){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));document.getElementById(i).classList.add('active')}
function os(){document.getElementById('sb').classList.add('a');document.getElementById('sh').classList.add('a')}
function cs2(){document.getElementById('sb').classList.remove('a');document.getElementById('sh').classList.remove('a')}
document.querySelectorAll('.sh .o').forEach(o=>{o.onclick=()=>{document.querySelectorAll('.sh .o').forEach(x=>x.classList.remove('s'));o.classList.add('s');document.getElementById('cs').textContent=o.dataset.c;document.getElementById('cb').classList.add('act');document.getElementById('cb').innerHTML='تأكيد';cs2()}});
function u(){const l=document.body.classList.contains('light');const t=l?'light':'dark';document.getElementById('r1').src=`https://tsdvxl.dunfinz.org/static/my/${t}/record.png`;document.getElementById('em').src=`https://tsdvxl.dunfinz.org/static/theme/${t}/icon/empty.png`}
</script>
</body></html>
