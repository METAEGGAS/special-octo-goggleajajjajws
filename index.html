<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>سحب</title><style>:root{--bg:#fff;--tx:#111;--mut:#777;--card:#fff;--box:#f7f7f7;--bd:#e9e9e9;--acc:#f0c33c}body.d{--bg:#000;--tx:#fff;--mut:#b7b7b7;--card:#121212;--box:#171717;--bd:#222}*{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif}html,body{margin:0;background:var(--bg);color:var(--tx)}.p{max-width:430px;min-height:100vh;margin:auto;padding:12px 14px 20px}.h{height:50px;position:relative;display:flex;align-items:center;justify-content:center;font-weight:700}.bk,.ri{position:absolute;top:6px}.bk{left:0;width:38px;height:38px;border:0;background:none;color:var(--tx);font-size:28px;cursor:pointer}.ri{right:0;display:flex;flex-direction:column;gap:8px;align-items:center}.ri img{width:26px;height:26px;object-fit:contain}.t{font-size:15px;font-weight:700;margin:14px 0 8px}.f,.amt,.fx,.sum{background:var(--box);border:1px solid var(--bd);border-radius:10px}.f,.amt,.fx{min-height:56px;display:flex;align-items:center;padding:0 14px}.f{justify-content:space-between;direction:ltr}.f b{font-size:18px;font-weight:500;color:var(--tx)}.r{direction:rtl;display:flex;align-items:center;gap:6px;color:var(--mut);font-size:16px}.ar{color:var(--acc);font-size:13px}.in{width:100%;background:none;border:0;outline:0;color:var(--tx);font-size:18px}.addr{padding:0 10px 0 14px;gap:8px}.cp{width:32px;height:32px;border:0;background:url(https://i.ibb.co/67wzrs3f/92.png) center/22px 22px no-repeat;cursor:pointer;flex:0 0 32px}.amt{padding-left:10px;gap:10px}.all{border:0;background:none;color:var(--acc);font-size:18px;cursor:pointer}.bal{margin:6px 2px 0;font-size:14px;color:var(--acc)}.bal span{color:var(--tx)}.fx .in{opacity:.9}.sum{margin-top:16px;padding:14px}.rw{display:flex;justify-content:space-between;align-items:center;font-size:15px;line-height:1.75;color:var(--tx)}.y{color:var(--acc)}.w{display:block;margin-top:6px;font-size:15px;line-height:1.7;color:var(--tx)}.ii{display:inline-flex;align-items:center;gap:6px}.ii img{width:15px;height:15px;object-fit:contain;vertical-align:middle}.sm{font-size:14px}.hide{display:none}</style></head><body><div class="p"><div class="h"><button class="bk" onclick="history.back()">‹</button><div>سحب</div><div class="ri"><img id="recordIcon" src="https://tsdvxl.dunfinz.org/static/my/light/record.png" alt=""><img id="walletIcon" src="https://tsdvxl.dunfinz.org/static/my/light/wallet.png" alt=""></div></div><div class="t">اختر العملة</div><div class="f"><b>USDT</b><div class="r">اختر عملة أخرى <span class="ar">▼</span></div></div><div class="t">قنوات الدفع</div><div class="f"><b style="direction:rtl">ERC20</b><div class="hide"></div></div><div class="t">عنوان السحب</div><div class="f addr"><input id="addr" class="in" value=""><button class="cp" onclick="navigator.clipboard.writeText(document.getElementById('addr').value||'')"></button></div><div class="t">كمية السحب</div><div class="amt"><input id="amt" class="in" type="number" min="0" max="10000" step="any" value="0" oninput="calc()"><button class="all" onclick="amt.value=0;calc()">الكل</button></div><div class="bal"><span>رصيد:</span> 0*USDT</div><div class="t">عمولة</div><div class="fx"><input id="feeField" class="in" value="0.00" readonly></div><div class="sum"><div class="rw"><span>مبلغ التسوية:</span><span><span id="settle">0</span> USDT</span></div><div class="rw"><span>رسوم السحب:</span><span id="feeTxt">0.00</span></div><div class="rw y"><span>المبلغ المستلم:</span><span>$ <span id="recv">0</span></span></div><div class="rw y"><span>رسم:</span><span>%10</span></div><div class="w">لا يزال هناك عجز في حجم التداول لتجنب رسوم المناولة الإضافية. : <span id="lack">0</span></div><div class="w ii"><img src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt=""><span>حد السحب الأدنى: 5</span></div><div class="w ii"><img src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt=""><span>أقصى مبلغ للانسحاب: 10000</span></div></div></div><script>const RATE=.1,MIN=5,MAX=1e4,record={light:"https://tsdvxl.dunfinz.org/static/my/light/record.png",dark:"https://tsdvxl.dunfinz.org/static/my/dark/record.png"},wallet={light:"https://tsdvxl.dunfinz.org/static/my/light/wallet.png",dark:"https://tsdvxl.dunfinz.org/static/my/dark/wallet.png"};function fmt(n,d=0){n=+n||0;return d?n.toFixed(d):((n+'').includes('.')?(+n.toFixed(8)+'').replace(/\.?0+$/,''):n)}function calc(){let a=Math.max(0,Math.min(MAX,parseFloat(amt.value)||0)),f=a*RATE,r=Math.max(0,a-f);amt.value=a;feeField.value=fmt(f,2);feeTxt.textContent=fmt(f,2);settle.textContent=fmt(a);recv.textContent=fmt(r);lack.textContent=0}function setTheme(t){document.body.className=t==="dark"?"d":"";recordIcon.src=record[t==="dark"?"dark":"light"];walletIcon.src=wallet[t==="dark"?"dark":"light"]}setTheme("light");calc();window.setTheme=setTheme;</script></body></html>
