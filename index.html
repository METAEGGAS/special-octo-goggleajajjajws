* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }

.container { width: 100%; max-width: 460px; padding: 20px; }
.logo { text-align: center; margin-bottom: 24px; }
.logo .main { font-size: 1.8rem; font-weight: 700; color: var(--bl2); }
.tabs { display: flex; background: var(--bgc); border: 1px solid var(--br); border-radius: var(--r) var(--r) 0 0; overflow: hidden; }
.tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; color: var(--tx2); border-bottom: 3px solid transparent; }
.tab.active { color: var(--bl2); border-bottom-color: var(--bl2); background: var(--bg2); }
.box { background: var(--bg2); border: 1px solid var(--br); border-top: none; border-radius: 0 0 var(--r) var(--r); padding: 28px 32px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.85rem; color: var(--tx2); margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 10px 14px; background: var(--bgc); border: 1px solid var(--br); border-radius: var(--r); color: var(--tx); font-size: 0.95rem; }
.field input:focus { outline: none; border-color: var(--bl); }
.btn { padding: 11px; border-radius: var(--r); border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; background: var(--bl); color: #fff; width: 100%; }
.btn:hover { background: var(--bl2); }
.error { background: rgba(218,54,51,0.1); border: 1px solid var(--err); border-radius: var(--r); padding: 10px; font-size: 0.85rem; color: var(--err); margin-bottom: 14px; display: none; }
.error.show { display: block; }
.success { background: rgba(63,185,80,0.1); border: 1px solid var(--ok); color: var(--ok); }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bgc); border: 1px solid var(--br); border-radius: var(--r); padding: 12px 24px; display: none; z-index: 999; }
#toast.show { display: block; }
#toast.success { border-color: var(--ok); color: var(--ok); }
#toast.error { border-color: var(--err); color: var(--err); }
.wtypes { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.wtbtn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--br); background: var(--bgc); color: var(--tx2); font-size: 0.78rem; cursor: pointer; }
.wtbtn.active { border-color: var(--bl2); color: var(--bl2); background: rgba(56,139,253,0.1); }
.hint { font-size: 0.75rem; color: var(--tx2); margin-top: 4px; }
.crow { display: flex; gap: 8px; }
.crow .field { flex: 1; }
.bsc { background: var(--bgc); border: 1px solid var(--br); color: var(--tx2); padding: 10px 14px; border-radius: var(--r); cursor: pointer; height: 42px; }
.bsc:hover { border-color: var(--bl2); color: var(--bl2); }
.api-debug { background: var(--bg); border: 1px solid var(--br); border-radius: var(--r); padding: 10px; margin-top: 10px; font-size: 0.75rem; color: var(--tx2); max-height: 150px; overflow-y: auto; display: none; }
.api-debug.show { display: block; }
.api-debug .request { color: var(--bl2); }
.api-debug .response { color: var(--ok); }
.api-debug .error { color: var(--err); }

    lX8 = (lX & 0x80000000);
    lY8 = (lY & 0x80000000);
    lX4 = (lX & 0x40000000);
    lY4 = (lY & 0x40000000);
    lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
    if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
    if (lX4 | lY4) {
      if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
      else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
    } else return (lResult ^ lX8 ^ lY8);
  }
  function F(x, y, z) { return (x & y) | ((~x) & z); }
  function G(x, y, z) { return (x & z) | (y & (~z)); }
  function H(x, y, z) { return (x ^ y ^ z); }
  function I(x, y, z) { return (y ^ (x | (~z))); }
  function FF(a, b, c, d, x, s, ac) {
    a = AddUnsigned(a, AddUnsigned(AddUnsigned(F(b, c, d), x), ac));
    return AddUnsigned(RotateLeft(a, s), b);
  }
  function GG(a, b, c, d, x, s, ac) {
    a = AddUnsigned(a, AddUnsigned(AddUnsigned(G(b, c, d), x), ac));
    return AddUnsigned(RotateLeft(a, s), b);
  }
  function HH(a, b, c, d, x, s, ac) {
    a = AddUnsigned(a, AddUnsigned(AddUnsigned(H(b, c, d), x), ac));
    return AddUnsigned(RotateLeft(a, s), b);
  }
  function II(a, b, c, d, x, s, ac) {
    a = AddUnsigned(a, AddUnsigned(AddUnsigned(I(b, c, d), x), ac));

    b = II(b, c, d, a, x[k + 5], S44, 0xFC93A039);
    a = II(a, b, c, d, x[k + 12], S41, 0x655B59C3);
    d = II(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
    c = II(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
    b = II(b, c, d, a, x[k + 1], S44, 0x85845DD1);
    a = II(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
    d = II(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
    c = II(c, d, a, b, x[k + 6], S43, 0xA3014314);
    b = II(b, c, d, a, x[k + 13], S44, 0x4E0811A1);
    a = II(a, b, c, d, x[k + 4], S41, 0xF7537E82);
    d = II(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
    c = II(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
    b = II(b, c, d, a, x[k + 9], S44, 0xEB86D391);
    a = AddUnsigned(a, AA);
    b = AddUnsigned(b, BB);
    c = AddUnsigned(c, CC);
    d = AddUnsigned(d, DD);
  }
  
  return (WordToHex(a) + WordToHex(b) + WordToHex(c) + WordToHex(d)).toLowerCase();
}

// ========== دالة RSA ==========
async function rsaSign(data) {
  try {
    const privateKey = await window.crypto.subtle.importKey(
      'pkcs8',
      str2ab(RSA_PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\s/g, '')),
      { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
      false,
      ['sign']
    );
    const signature = await window.crypto.subtle.sign(
      'RSASSA-PKCS1-v1_5',
      privateKey,
      new TextEncoder().encode(data)
    );
    return btoa(String.fromCharCode(...new Uint8Array(signature)));
  } catch (e) {
    console.error('RSA Error:', e);
    return btoa(data + '_rsa_fallback');
  }
}

function str2ab(str) {
  const buf = new ArrayBuffer(str.length);
  const bufView = new Uint8Array(buf);
  for (let i = 0; i < str.length; i++) bufView[i] = str.charCodeAt(i);
  return buf;
}

// ========== دالة توليد الهيدرز من الملف الأصلي ==========
async function generateHeaders(endpoint, method = 'GET', data = null) {
  const token = currentToken || '';
  const userId = currentUserId || '';
  const timestamp = Date.now();
  const signType = token ? 'MD5' : 'RSA';
  
  const headers = {
    'Accept': 'application/json; charset=utf-8',
    'Content-Type': 'application/json',
    'Appid': 'h5_client',
    'ClientType': 'H5',
    'ClientVersion': '1.0.0',
    'Timestamp': timestamp.toString(),
    'Token': token,
    'Userid': userId,
    'Signtype': signType,
    'Lang': 'ar',
    'Origin': 'en',
    'Referer': 'https://excorx.com/',
    'User-Agent': 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36'
  };
  
  // بناء نص التوقيع حسب ترتيب الملف الأصلي
  const path = endpoint.split('?')[0];
  let signString = method.toUpperCase() + path + timestamp;
  
  if (data && typeof data === 'object') {
    // ترتيب المفاتيح أبجدياً كما في الملف الأصلي
    const keys = Object.keys(data).sort();
    for (const key of keys) {
      if (data[key] !== undefined && data[key] !== null && data[key] !== '') {
        signString += key + data[key];
      }
    }
  }
  
  if (token) {
    signString += token;
  }
  
  // حساب التوقيع
  headers['Sign'] = signType === 'MD5' ? md5(signString) : await rsaSign(signString);
  
  return headers;
}

// ========== دالة طلب API مع عرض تفاصيل المشاكل ==========
async function apiRequest(method, endpoint, data = null) {
  const headers = await generateHeaders(endpoint, method, data);
  
  const options = {
    method: method,
    headers: headers,
    mode: 'cors'
  };
  
  if (data && (method === 'POST' || method === 'PUT')) {
    options.body = JSON.stringify(data);
  }
  
  addDebugLog('request', endpoint, data, null);
  
  try {
    const response = await fetch(BASE_URL + endpoint, options);
    const result = await response.json();
    
    addDebugLog('response', endpoint, data, result);
    
    if (response.status === 200 && result.code === 200) {
      return { success: true, data: result.data };
    } else {
      // عرض تفاصيل الخطأ كاملة
      let errorMsg = result.msg || 'خطأ في الطلب';
      
      // إذا كان الخطأ بسبب حقل ناقص
      if (result.code === 400 && result.require) {
        errorMsg += ` - الحقول المطلوبة: ${result.require.join(', ')}`;
      }
      
      // إذا كان الخطأ بسبب wallet_address
      if (result.msg && result.msg.includes('wallet_address')) {
        errorMsg = '❌ عنوان المحفظة مطلوب ولم يتم العثور عليه في قاعدة البيانات';
        
        // محاولة إرسال العنوان المحفوظ
        const savedWallet = localStorage.getItem('exc_walletAddr');
        if (savedWallet) {
          errorMsg += `\n⚠️ لديك عنوان محفوظ محلياً: ${savedWallet}`;
          errorMsg += `\n🔄 جاري محاولة تحديثه على السيرفر...`;
          
          // محاولة تحديث العنوان تلقائياً
          setTimeout(async () => {
            await updateWalletOnServer(savedWallet, localStorage.getItem('exc_walletType') || 'TRX');
          }, 1000);
        }
      }
      
      return { 
        success: false, 
        error: errorMsg, 
        code: result.code,
        require: result.require,
        fullResponse: result
      };
    }
  } catch (error) {
    addDebugLog('error', endpoint, data, null, error.message);
    return { success: false, error: 'فشل الاتصال بالسيرفر: ' + error.message };
  }
}

// ========== دالة تحديث عنوان المحفظة على السيرفر ==========
async function updateWalletOnServer(address, type = 'TRX') {
  addDebugLog('request', '/personal/updateWallet', { wallet_address: address, wallet_type: type });
  
  const result = await apiRequest('POST', '/personal/updateWalletAddress', {
    wallet_address: address,
    wallet_type: type
  });

  if (result.success) {
    showToast('✅ تم تحديث العنوان على السيرفر', 'success');
    localStorage.setItem('exc_walletAddr', address);
    localStorage.setItem('exc_walletType', type);
    return true;
  } else {
    showToast('❌ فشل تحديث العنوان: ' + result.error, 'error');
    return false;
  }
}

// ========== التبويبات ==========
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
  document.getElementById('registerBox').style.display = isLogin ? 'none' : 'block';
}

// ========== دوال نوع المحفظة ==========
function selectWalletType(type, btn) {
  currentWalletType = type;
  document.querySelectorAll('.wtbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const hints = {
    TRX: 'عنوان TRX: 34 حرف يبدأ بـ T',
    ETH: 'عنوان ETH: 42 حرف يبدأ بـ 0x',
    BTC: 'عنوان BTC: 26-35 حرف يبدأ بـ 1 أو 3'
  };
  document.getElementById('walletHint').textContent = hints[type] || '';
  localStorage.setItem('exc_walletType', type);
}

function generateWallet() {
  let addr = '';
  if (currentWalletType === 'TRX') {
    addr = 'T' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    addr = addr.substring(0, 34);
  } else if (currentWalletType === 'ETH') {
    addr = '0x' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 10);
    addr = addr.substring(0, 42);
  } else {
    addr = '1' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 10);
    addr = addr.substring(0, 34);
  }
  
  document.getElementById('walletAddress').value = addr;
  document.getElementById('walletInfo').value = currentWalletType + '-Auto';
  showToast('✓ تم توليد عنوان ' + currentWalletType, 'success');
  localStorage.setItem('exc_walletAddr', addr);
}

// ========== إرسال كود التحقق ==========
async function sendCode() {
  const email = document.getElementById('loginEmail').value;
  if (!email) return showToast('أدخل البريد أولاً', 'error');
  
  const result = await apiRequest('POST', '/login/sendEmailVerify', { email });
  if (result.success) {
    showToast('✓ تم إرسال الكود', 'success');
  } else {
    showToast(result.error, 'error');
  }
}

async function sendRegCode() {
  const email = document.getElementById('regEmail').value;
  if (!email) return showToast('أدخل البريد أولاً', 'error');
  
  const result = await apiRequest('POST', '/login/sendEmailVerify', { email });
  if (result.success) {
    showToast('✓ تم إرسال الكود', 'success');
    document.getElementById('emailCode').value = '123456';
  } else {
    showToast(result.error, 'error');
  }
}

// ========== إنشاء حساب ==========
async function register() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const wallet = document.getElementById('walletAddress').value;
  const walletInfo = document.getElementById('walletInfo').value;
  const invite = document.getElementById('inviteCode').value;
  const emailCode = document.getElementById('emailCode').value;
  const errorEl = document.getElementById('registerError');
  
  if (!email || !password || !wallet) {
    errorEl.textContent = '❌ البريد، كلمة المرور، وعنوان المحفظة مطلوبة';
    errorEl.classList.add('show');
    return;
  }
  
  if (password !== confirm) {
    errorEl.textContent = '❌ كلمة المرور غير متطابقة';
    errorEl.classList.add('show');
    return;
  }
  
  errorEl.classList.remove('show');
  
  const data = {
    email,
    password,
    repassword: confirm,
    type: '0',
    wallet_address: wallet,
    walletInfo: walletInfo || wallet,
    inviteCode: invite || '',
    emailCode: emailCode || ''
  };
  
  const result = await apiRequest('POST', '/login/register', data);
  
  if (result.success) {
    // حفظ عنوان المحفظة في localStorage
    localStorage.setItem('exc_walletAddr', wallet);
    localStorage.setItem('exc_walletType', currentWalletType);
    localStorage.setItem('exc_walletInfo', walletInfo || wallet);
    
    showToast('✅ تم إنشاء الحساب', 'success');
    switchTab('login');
    
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPassword').value = password;
  } else {
    errorEl.textContent = result.error;
    errorEl.classList.add('show');
  }
}

// ========== تسجيل الدخول ==========
async function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const googleCode = document.getElementById('googleCode').value;
  const errorEl = document.getElementById('loginError');
  
  if (!email || !password) {
    errorEl.textContent = '❌ أدخل البريد وكلمة المرور';
    errorEl.classList.add('show');
    return;
  }
  
  errorEl.classList.remove('show');
  
  const data = { email, password, type: '0' };
  if (googleCode) data.googleCode = googleCode;
  
  const result = await apiRequest('POST', '/login/login', data);
  
  if (result.success) {
    const userData = result.data;
    
    currentToken = userData.token;
    currentUserId = userData.uid;
    currentEmail = email;
    
    localStorage.setItem('exc_token', currentToken);
    localStorage.setItem('exc_userId', currentUserId);
    localStorage.setItem('exc_email', email);
    
    // إذا السيرفر رد بعنوان محفظة، نحفظه
    if (userData.wallet_address) {
      localStorage.setItem('exc_walletAddr', userData.wallet_address);
    }
    
    // جلب معلومات المستخدم الكاملة
    await fetchUserInfo();
    
    // التأكد من وجود عنوان محفظة على السيرفر
    const savedWallet = localStorage.getItem('exc_walletAddr');
    if (savedWallet) {
      // التحقق إذا كان السيرفر عنده العنوان
      setTimeout(async () => {
        await updateWalletOnServer(savedWallet, localStorage.getItem('exc_walletType') || 'TRX');
      }, 500);
    }
    
    showToast('✅ تم الدخول بنجاح', 'success');
    showDashboard();
  } else {
    errorEl.textContent = result.error;
    errorEl.classList.add('show');
    
    if (result.error.includes('google') || result.error.includes('2FA') || result.code === 40007) {
      document.getElementById('googleField').style.display = 'block';
    }
    
    // إذا الخطأ بسبب wallet_address، نعرض زر التحديث
    if (result.error.includes('wallet_address')) {
      errorEl.innerHTML += `<br><button class="btn" style="margin-top:10px;" onclick="promptWalletUpdate()">🔄 تحديث عنوان المحفظة</button>`;
    }
  }
}

// ========== طلب تحديث عنوان المحفظة ==========
function promptWalletUpdate() {
  const savedWallet = localStorage.getItem('exc_walletAddr');
  if (savedWallet) {
    if (confirm(`هل تريد تحديث عنوان المحفظة على السيرفر؟\nالعنوان المحفوظ: ${savedWallet}`)) {
      updateWalletOnServer(savedWallet, localStorage.getItem('exc_walletType') || 'TRX');
    }
  } else {
    alert('لا يوجد عنوان محفظة محفوظ. الرجاء إدخال عنوان المحفظة أولاً.');
    switchTab('register');
  }
}

// ========== جلب معلومات المستخدم ==========
async function fetchUserInfo() {
  const result = await apiRequest('GET', '/personal/userInfo');
  if (result.success && result.data) {
    if (result.data.wallet_address) {
      localStorage.setItem('exc_walletAddr', result.data.wallet_address);
    }
    if (result.data.wallet_type) {
      localStorage.setItem('exc_walletType', result.data.wallet_type);
    }
    return result.data;
  }
  return null;
}

// ========== عرض لوحة التحكم ==========
function showDashboard() {
  document.getElementById('authContainer').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  
  const walletAddr = localStorage.getItem('exc_walletAddr') || 'غير محدد';
  const walletType = localStorage.getItem('exc_walletType') || 'TRX';
  
  document.getElementById('welcomeMsg').textContent = `مرحباً ${currentEmail}`;
  
  document.getElementById('userInfo').innerHTML = `
    <div style="margin-bottom: 10px;"><strong>📧 البريد:</strong> ${currentEmail}</div>
    <div style="margin-bottom: 10px;"><strong>🆔 المعرف:</strong> ${currentUserId}</div>
    <div style="margin-bottom: 10px;"><strong>🏦 المحفظة (${walletType}):</strong> ${walletAddr}</div>
    <div style="margin-bottom: 10px;"><strong>🔑 التوكن:</strong> ${currentToken.substring(0, 25)}...</div>
    <div style="margin-bottom: 10px;"><strong>📅 آخر دخول:</strong> ${new Date().toLocaleString('ar-EG')}</div>
    <button class="btn" style="width: auto; padding: 8px 16px; margin-top: 10px;" onclick="promptWalletUpdate()">🔄 تحديث المحفظة على السيرفر</button>
  `;
}

// ========== تسجيل الخروج ==========
function logout() {
  localStorage.removeItem('exc_token');
  localStorage.removeItem('exc_userId');
  localStorage.removeItem('exc_email');
  localStorage.removeItem('exc_walletAddr');
  localStorage.removeItem('exc_walletType');
  localStorage.removeItem('exc_walletInfo');
  
  currentToken = null;
  currentUserId = null;
  currentEmail = null;
  
  document.getElementById('authContainer').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('googleCode').value = '';
  document.getElementById('googleField').style.display = 'none';
  
  showToast('✓ تم تسجيل الخروج', 'success');
}

// ========== التحقق من الجلسة عند التحميل ==========
window.addEventListener('DOMContentLoaded', async () => {
  if (currentToken && currentUserId) {
    const userData = await fetchUserInfo();
    if (userData) {
      showDashboard();
    } else {
      logout();
    }
  }
  
  // استعادة نوع المحفظة المحفوظ
  const savedType = localStorage.getItem('exc_walletType');
  if (savedType) {
    currentWalletType = savedType;
    const btns = document.querySelectorAll('.wtbtn');
    btns.forEach(btn => {
      if (btn.textContent.includes(savedType)) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }
});
</script>
