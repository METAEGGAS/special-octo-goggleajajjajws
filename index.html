<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>سحب</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#f7f8fa;color:#111;font-family:"Noto Sans Arabic",system-ui,sans-serif}a,button,input{font-family:inherit}input{border:0;outline:0;background:0 0}button{border:0;background:0 0;padding:0;cursor:pointer}.p{min-height:100vh;padding:8px 10px 14px}.h{height:46px;position:relative;display:flex;align-items:center;justify-content:center;font-size:16px}.bk{position:absolute;left:2px;top:4px;width:34px;height:34px;display:grid;place-items:center;color:#222;font-size:26px}.ri{position:absolute;right:2px;top:2px;display:flex;flex-direction:column;gap:6px}.ri img{width:26px;height:26px;object-fit:contain}.lb{font-size:16px;margin:6px 8px 8px;color:#111}.bx{height:58px;background:#fff;border-radius:14px;box-shadow:0 1px 0 rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.02);display:flex;align-items:center;padding:0 14px;margin:0 2px}.sel{justify-content:space-between}.v{font-size:16px;color:#222}.mut{color:#cfae34;font-size:15px}.arr{font-size:11px;vertical-align:1px;margin-right:3px}.addr{padding:0 10px 0 14px}.addr input,.amt input,.fee input{width:100%;font-size:16px;color:#222;text-align:left;direction:ltr}.cp{width:30px;height:30px;background:url(https://i.ibb.co/67wzrs3f/92.png) center/22px 22px no-repeat;flex:0 0 30px}.amt{justify-content:space-between}.all{color:#d9ba47;font-size:15px}.bal{font-size:12px;color:#d9ba47;margin:5px 6px 18px}.card{background:#fff;border-radius:14px;box-shadow:0 1px 0 rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.02);padding:14px 12px 12px;margin:10px 2px 0;line-height:1.9;font-size:14px}.y{color:#e2bb46}.i{width:14px;height:14px;vertical-align:-2px;opacity:.55;margin-left:4px}.sp{height:10px}</style></head><body><div class=p><div class=h><button class=bk onclick="history.back()">‹</button>سحب<div class=ri><img src="https://tsdvxl.dunfinz.org/static/my/light/record.png" alt=""><img src="https://tsdvxl.dunfinz.org/static/my/light/wallet.png" alt=""></div></div><div class=lb>اختر العملة</div><div class="bx sel"><span class=mut><span class=arr>▼</span>اختر عملة أخرى</span><span class=v>USDT</span></div><div class=sp></div><div class=lb>قنوات الدفع</div><div class=bx><span class=v style="direction:ltr">ERC20</span></div><div class=sp></div><div class=lb>عنوان السحب</div><div class="bx addr"><button class=cp onclick="navigator.clipboard.writeText(a.value||'')"></button><input id=a></div><div class=sp></div><div class=lb>كمية السحب</div><div class="bx amt"><button class=all onclick="m.value=0;u()">الكل</button><input id=m type=number step=any value=5 oninput="u()"></div><div class=bal>*رصيد:0 USDT</div><div class=lb>عمولة</div><div class="bx fee"><input id=f value="0.50" readonly></div><div class=card><div>USDT مبلغ التسوية : <span id=s>5</span></div><div>رسوم السحب : <span id=w>0.50</span></div><div class=y>المبلغ المستلم : $ <span id=r>4.5</span></div><div>%10 رسم:</div><div>لا يزال هناك عجز في حجم التداول لتجنب رسوم المناولة<br>الإضافية. : 0</div><div><img class=i src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt="">حد السحب الأدنى : 5</div><div><img class=i src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt="">أقصى مبلغ للانسحاب : 10000</div></div></div><script>function x(n,d){n=+n||0;return d?n.toFixed(d):(""+(+n.toFixed(8))).replace(/\.?0+$/,"")}function u(){let n=Math.max(0,Math.min(1e4,parseFloat(m.value)||0)),k=n*.1,t=Math.max(0,n-k);m.value=x(n);f.value=x(k,2);s.textContent=x(n);w.textContent=x(k,2);r.textContent=x(t)}u()</script></body></html>
