<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>سحب</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#f6f7f8;color:#111;font-family:"Noto Sans Arabic",system-ui,sans-serif}button,input{font:inherit}button,input{border:0;outline:0;background:none}button{cursor:pointer}.p{min-height:100vh;padding:7px 10px 14px}.h{height:42px;position:relative;display:flex;align-items:center;justify-content:center;font-size:17px}.bk{position:absolute;left:0;top:2px;width:34px;height:34px;font-size:28px;display:grid;place-items:center;color:#222}.ri{position:absolute;right:0;top:2px;display:flex;flex-direction:column;gap:6px}.ri img{width:26px;height:26px;object-fit:contain}.lb{margin:8px 6px 7px;text-align:right;font-size:15px;font-weight:500}.bx,.card{background:#fff;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.025)}.bx{height:52px;padding:0 12px;display:flex;align-items:center;margin:0 1px}.sel{justify-content:space-between}.sel .r{font-size:16px;color:#222}.sel .l{font-size:14px;color:#d8b53a;display:flex;align-items:center;gap:4px}.v{font-size:15px;color:#222;direction:ltr;text-align:left}.grow{flex:1}.cp{width:29px;height:29px;background:url(https://i.ibb.co/67wzrs3f/92.png) center/22px no-repeat}.all{font-size:14px;color:#d8b53a}.bal{margin:5px 4px 14px;text-align:right;font-size:12px;color:#d8b53a}.card{margin:10px 1px 0;padding:12px 12px 10px;text-align:right;line-height:1.95;font-size:14px}.y{color:#dfbf4b}.i{width:14px;height:14px;vertical-align:-2px;margin-left:4px;opacity:.45}.ov{position:fixed;inset:0;background:rgba(0,0,0,.38);opacity:0;visibility:hidden;transition:.18s}.ov.on{opacity:1;visibility:visible}.sh{position:fixed;left:0;right:0;bottom:-220px;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -2px 20px rgba(0,0,0,.15);transition:.18s}.sh.on{bottom:0}.opt{height:52px;display:flex;align-items:center;justify-content:center;font-size:18px;border-top:1px solid #ececec}.opt:first-child{border-top:0;color:#111;font-weight:500}.opt:last-child{color:#9a9a9a}</style></head><body><div class=p><div class=h><button class=bk onclick="history.back()">‹</button>سحب<div class=ri><img src="https://tsdvxl.dunfinz.org/static/my/light/record.png" alt=""><img src="https://tsdvxl.dunfinz.org/static/my/light/wallet.png" alt=""></div></div><div class=lb>اختر العملة</div><button class="bx sel" onclick="openSheet()"><span class=l><span>▼</span><span>اختر عملة أخرى</span></span><span class=r id=coin>USDT</span></button><div class=lb>قنوات الدفع</div><div class=bx><input class=v value="ERC20" readonly></div><div class=lb>عنوان السحب</div><div class=bx style="gap:8px"><button class=cp onclick="navigator.clipboard.writeText(addr.value||'')"></button><input id=addr class="v grow" value=""></div><div class=lb>كمية السحب</div><div class=bx style="justify-content:space-between;gap:10px"><button class=all onclick="amt.value=5;calc()">الكل</button><input id=amt class=v type=number step=any value=5 oninput="calc()"></div><div class=bal>*رصيد:0 USDT</div><div class=lb>عمولة</div><div class=bx><input id=fee class=v value="0.50" readonly></div><div class=card><div><span id=s>5</span> : USDT مبلغ التسوية</div><div><span id=f>0.50</span> : رسوم السحب</div><div class=y>$ <span id=r>4.5</span> : المبلغ المستلم</div><div>10 : %رسم</div><div>لا يزال هناك عجز في حجم التداول لتجنب رسوم المناولة<br>الإضافية. : 0</div><div><img class=i src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt="">حد السحب الأدنى : 5</div><div><img class=i src="https://tsdvxl.dunfinz.org/static/my/dark/sigh.png" alt="">أقصى مبلغ للانسحاب : 10000</div></div></div><div id=ov class=ov onclick="closeSheet()"></div><div id=sh class=sh><button class=opt onclick="pick('USDT')">USDT</button><button class=opt onclick="pick('USDC')">USDC</button></div><script>function n(x,d){x=+x||0;return d?x.toFixed(d):(""+(+x.toFixed(8))).replace(/\.?0+$/,"")}function calc(){let a=Math.max(0,Math.min(1e4,parseFloat(amt.value)||0)),k=a*.1,z=Math.max(0,a-k);amt.value=n(a);fee.value=n(k,2);s.textContent=n(a);f.textContent=n(k,2);r.textContent=n(z)}function openSheet(){ov.classList.add('on');sh.classList.add('on')}function closeSheet(){ov.classList.remove('on');sh.classList.remove('on')}function pick(c){coin.textContent=c;closeSheet()}calc()</script></body></html>
