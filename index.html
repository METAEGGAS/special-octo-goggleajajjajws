<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXCOREX AUTH SYSTEM</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bgc:#1c2128;--br:#30363d;--ac:#238636;--ac2:#2ea043;--bl:#1f6feb;--bl2:#388bfd;--tx:#e6edf3;--tx2:#8b949e;--err:#da3633;--wa:#d29922;--ok:#3fb950;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-container{width:100%;max-width:460px;padding:20px}
.logo{text-align:center;margin-bottom:24px}
.logo .main{font-size:1.8rem;font-weight:700;color:var(--bl2);letter-spacing:1px}
.logo .sub{color:var(--tx2);font-size:.9rem}
.atabs{display:flex;background:var(--bgc);border:1px solid var(--br);border-radius:var(--r) var(--r) 0 0;overflow:hidden}
.atab{flex:1;padding:14px;text-align:center;cursor:pointer;color:var(--tx2);font-size:.95rem;font-weight:500;border-bottom:3px solid transparent;transition:all .2s}
.atab.active{color:var(--bl2);border-bottom-color:var(--bl2);background:var(--bg2)}
.abox{background:var(--bg2);border:1px solid var(--br);border-top:none;border-radius:0 0 var(--r) var(--r);padding:28px 32px 32px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.85rem;color:var(--tx2);margin-bottom:6px}
.fg input,.fg select{width:100%;padding:10px 14px;background:var(--bgc);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-size:.95rem}
.fg input:focus{outline:none;border-color:var(--bl)}
.btn{padding:9px 20px;border-radius:var(--r);border:none;cursor:pointer;font-size:.9rem;font-weight:500;background:var(--bl);color:#fff;width:100%;justify-content:center;padding:11px}
.btn:hover{background:var(--bl2)}
.eb{background:rgba(218,54,51,.1);border:1px solid var(--err);border-radius:var(--r);padding:10px 14px;font-size:.85rem;color:var(--err);margin-bottom:14px;display:none}
.eb.show{display:block}
.crow{display:flex;gap:8px}
.crow .fg{flex:1}
.bsc{background:var(--bgc);border:1px solid var(--br);color:var(--tx2);padding:10px 14px;border-radius:var(--r);cursor:pointer;height:42px}
.bsc:hover{border-color:var(--bl2);color:var(--bl2)}
.wtypes{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.wtbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--br);background:var(--bgc);color:var(--tx2);font-size:.78rem;cursor:pointer}
.wtbtn.active{border-color:var(--bl2);color:var(--bl2);background:rgba(56,139,253,.1)}
.hint{font-size:.75rem;color:var(--tx2);margin-top:4px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bgc);border:1px solid var(--br);border-radius:var(--r);padding:12px 24px;font-size:.9rem;display:none;z-index:999}
#toast.show{display:block}#toast.success{border-color:var(--ok);color:var(--ok)}#toast.error{border-color:var(--err);color:var(--err)}
#dashboard{display:none;width:100%;max-width:600px;margin:0 auto;text-align:center}
.welcome-box{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:32px;margin-bottom:20px}
.welcome-box h2{color:var(--bl2);margin-bottom:16px}
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Auth Container -->
<div id="authContainer" class="auth-container">
  <div class="logo">
    <div class="main">EXCOREX</div>
    <div class="sub">نظام المصادقة الموحد</div>
  </div>
  
  <div class="atabs">
    <div class="atab active" id="tabLogin" onclick="switchTab('login')">🔐 تسجيل الدخول</div>
    <div class="atab" id="tabRegister" onclick="switchTab('register')">📝 إنشاء حساب</div>
  </div>
  
  <!-- Login Box -->
  <div id="loginBox" class="abox">
    <div class="eb" id="loginError"></div>
    <div class="fg">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="admin@excorex.com">
    </div>
    <div class="fg">
      <label>كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <div class="fg" id="google2faField" style="display:none">
      <label>🔑 كود Google Authenticator</label>
      <div class="crow">
        <input type="text" id="googleCode" placeholder="000000">
        <button class="bsc" id="sendCodeBtn" onclick="sendVerificationCode()">إرسال كود</button>
      </div>
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">دخول</button>
  </div>
  
  <!-- Register Box -->
  <div id="registerBox" class="abox" style="display:none">
    <div class="eb" id="registerError"></div>
    <div class="fg">
      <label>البريد الإلكتروني *</label>
      <input type="email" id="regEmail" placeholder="user@example.com">
    </div>
    <div class="fg">
      <label>كلمة المرور *</label>
      <input type="password" id="regPassword" placeholder="••••••••">
    </div>
    <div class="fg">
      <label>تأكيد كلمة المرور *</label>
      <input type="password" id="regConfirmPassword" placeholder="••••••••">
    </div>
    <div class="fg">
      <label>نوع المحفظة</label>
      <div class="wtypes">
        <span class="wtbtn active" onclick="selectWalletType('TRX',this)">TRX/TRC20</span>
        <span class="wtbtn" onclick="selectWalletType('ETH',this)">ETH/ERC20</span>
        <span class="wtbtn" onclick="selectWalletType('BTC',this)">BTC</span>
      </div>
    </div>
    <div class="fg">
      <label>عنوان المحفظة *</label>
      <div class="crow">
        <input type="text" id="walletAddress" placeholder="مثال TRX: TX...">
        <button class="bsc" onclick="generateWallet()">⚡ توليد</button>
      </div>
      <div class="hint" id="walletHint">مثال: TXxxxxxxxx... (34 حرف)</div>
    </div>
    <div class="fg">
      <label>معلومات المحفظة (اختياري)</label>
      <input type="text" id="walletInfo" placeholder="TRX-Auto">
    </div>
    <div class="fg">
      <label>كود الدعوة (اختياري)</label>
      <input type="text" id="inviteCode" placeholder="ADMIN2024">
    </div>
    <div class="fg">
      <label>كود التحقق بالبريد</label>
      <div class="crow">
        <input type="text" id="emailCode" placeholder="123456">
        <button class="bsc" id="regSendCodeBtn" onclick="sendRegCode()">إرسال كود</button>
      </div>
    </div>
    <button class="btn" id="registerBtn" onclick="handleRegister()">إنشاء الحساب</button>
  </div>
</div>

<!-- Dashboard (بعد تسجيل الدخول الناجح) -->
<div id="dashboard">
  <div class="welcome-box">
    <h2 id="welcomeMessage">مرحباً!</h2>
    <p>تم تسجيل الدخول بنجاح ✓</p>
    <div style="margin-top:20px;padding:16px;background:var(--bg);border-radius:var(--r);text-align:right">
      <div id="userInfo" style="font-size:.9rem;color:var(--tx2)"></div>
    </div>
    <button class="btn" style="margin-top:20px;width:auto;padding:8px 24px" onclick="logout()">تسجيل خروج</button>
  </div>
</div>

<script>

// ========== إعدادات التخزين المحلي ==========
const STORAGE_KEYS = {
  USERS: 'excorex_users',
  CURRENT: 'excorex_current',
  TOKEN: 'exc_token',
  USER_ID: 'exc_userId',
  EMAIL: 'exc_email'
};

// ========== دوال مساعدة ==========
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  setTimeout(() => el.className = '', 2500);
}

// ========== دوال MD5 (مبسطة) ==========
function md5(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(16).padStart(32, '0');
}

// ========== دوال التوقيع ==========
function generateSign(endpoint, data = {}, token = '') {
  const timestamp = Date.now();
  let signString = endpoint + timestamp;
  
  if (data && typeof data === 'object') {
    const keys = Object.keys(data).sort();
    for (const k of keys) {
      if (data[k] !== undefined && data[k] !== null && data[k] !== '') {
        signString += k + data[k];
      }
    }
  }
  
  if (token) {
    signString += token;
  }
  
  return md5(signString);
}

// ========== دوال المستخدمين ==========
function loadUsers() {
  const saved = localStorage.getItem(STORAGE_KEYS.USERS);
  return saved ? JSON.parse(saved) : [];
}

function saveUsers(users) {
  localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
}

function getCurrentUser() {
  const saved = localStorage.getItem(STORAGE_KEYS.CURRENT);
  return saved ? JSON.parse(saved) : null;
}

// ========== واجهة التبويبات ==========
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
  document.getElementById('registerBox').style.display = isLogin ? 'none' : 'block';
}

// ========== دوال إنشاء الحساب ==========
let currentWalletType = 'TRX';

function selectWalletType(type, btn) {
  currentWalletType = type;
  document.querySelectorAll('.wtbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const hints = {
    TRX: 'عنوان TRX: 34 حرف يبدأ بـ T',
    ETH: 'عنوان ETH: 42 حرف يبدأ بـ 0x',
    BTC: 'عنوان BTC: 26-35 حرف يبدأ بـ 1 أو 3'
  };
  document.getElementById('walletHint').textContent = hints[type] || '';
}

function generateWallet() {
  const type = currentWalletType;
  let addr = '';
  
  if (type === 'TRX') {
    addr = 'T' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    addr = addr.substring(0, 34);
  } else if (type === 'ETH') {
    addr = '0x' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 10);
    addr = addr.substring(0, 42);
  } else {
    addr = '1' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 10);
    addr = addr.substring(0, 34);
  }
  
  document.getElementById('walletAddress').value = addr;
  document.getElementById('walletInfo').value = type + '-Auto';
  showToast('✓ تم توليد عنوان ' + type, 'success');
}

// ========== دوال إرسال الكود (معطلة ولكن تعطي نجاح) ==========
function sendVerificationCode() {
  showToast('✓ تم إرسال الكود (وهمي)', 'success');
  document.getElementById('googleCode').value = '123456';
}

function sendRegCode() {
  showToast('✓ تم إرسال كود التحقق', 'success');
  document.getElementById('emailCode').value = '123456';
}

// ========== دالة إنشاء الحساب ==========
function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const confirmPass = document.getElementById('regConfirmPassword').value.trim();
  const walletAddr = document.getElementById('walletAddress').value.trim();
  const walletInfo = document.getElementById('walletInfo').value.trim();
  const invite = document.getElementById('inviteCode').value.trim();
  const emailCode = document.getElementById('emailCode').value.trim();
  const errorEl = document.getElementById('registerError');
  
  // التحقق من الحقول المطلوبة
  if (!email || !password || !walletAddr) {
    errorEl.textContent = '❌ البريد، كلمة المرور، وعنوان المحفظة مطلوبة';
    errorEl.classList.add('show');
    return;
  }
  
  if (password !== confirmPass) {
    errorEl.textContent = '❌ كلمة المرور غير متطابقة';
    errorEl.classList.add('show');
    return;
  }
  
  errorEl.classList.remove('show');
  
  // جلب المستخدمين المخزنين
  let users = loadUsers();
  
  // التحقق من وجود البريد
  if (users.find(u => u.email === email)) {
    errorEl.textContent = '❌ هذا البريد مسجل مسبقاً';
    errorEl.classList.add('show');
    return;
  }
  
  // حساب التوقيع
  const data = {
    email, password, walletAddr, walletInfo,
    inviteCode: invite || '',
    emailCode: emailCode || '123456'
  };
  const sign = generateSign('/login/register', data);
  
  // إنشاء مستخدم جديد
  const newUser = {
    id: Date.now(),
    email: email,
    password: btoa(password), // تشفير بسيط
    walletAddress: walletAddr,
    walletInfo: walletInfo || walletAddr,
    walletType: currentWalletType,
    inviteCode: invite || '',
    myInviteCode: 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase(),
    createdAt: new Date().toISOString(),
    sign: sign,
    token: 'token_' + Date.now() + '_' + Math.random().toString(36).substring(2)
  };
  
  // حفظ المستخدم
  users.push(newUser);
  saveUsers(users);
  
  // حفظ الجلسة الحالية
  localStorage.setItem(STORAGE_KEYS.TOKEN, newUser.token);
  localStorage.setItem(STORAGE_KEYS.USER_ID, newUser.id);
  localStorage.setItem(STORAGE_KEYS.EMAIL, email);
  localStorage.setItem(STORAGE_KEYS.CURRENT, JSON.stringify(newUser));
  
  showToast('✅ تم إنشاء الحساب بنجاح', 'success');
  
  // عرض لوحة التحكم
  showDashboard(newUser);
}

// ========== دالة تسجيل الدخول ==========
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const googleCode = document.getElementById('googleCode').value.trim();
  const errorEl = document.getElementById('loginError');
  
  if (!email || !password) {
    errorEl.textContent = '❌ أدخل البريد وكلمة المرور';
    errorEl.classList.add('show');
    return;
  }
  
  errorEl.classList.remove('show');
  
  // جلب المستخدمين
  const users = loadUsers();
  
  // البحث عن المستخدم
  const user = users.find(u => u.email === email && atob(u.password) === password);
  
  if (user) {
    // حساب التوقيع
    const data = { email, timestamp: Date.now() };
    const sign = generateSign('/login/login', data, user.token);
    
    // تحديث التوكن
    user.token = 'token_' + Date.now() + '_' + Math.random().toString(36).substring(2);
    user.lastLogin = new Date().toISOString();
    
    // حفظ التحديثات
    const updatedUsers = users.map(u => u.email === email ? user : u);
    saveUsers(updatedUsers);
    
    // حفظ الجلسة الحالية
    localStorage.setItem(STORAGE_KEYS.TOKEN, user.token);
    localStorage.setItem(STORAGE_KEYS.USER_ID, user.id);
    localStorage.setItem(STORAGE_KEYS.EMAIL, email);
    localStorage.setItem(STORAGE_KEYS.CURRENT, JSON.stringify(user));
    
    showToast('✅ مرحباً! تم الدخول بنجاح', 'success');
    showDashboard(user);
  } else {
    errorEl.textContent = '❌ بريد أو كلمة مرور غير صحيحة';
    errorEl.classList.add('show');
  }
}

// ========== عرض لوحة التحكم ==========
function showDashboard(user) {
  document.getElementById('authContainer').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('welcomeMessage').textContent = 'مرحباً ' + (user.email || '') + ' 👋';
  
  const userInfo = document.getElementById('userInfo');
  userInfo.innerHTML = `
    <div style="margin-bottom:8px"><strong>📧 البريد:</strong> ${user.email}</div>
    <div style="margin-bottom:8px"><strong>🔑 التوكن:</strong> ${user.token.substring(0, 30)}...</div>
    <div style="margin-bottom:8px"><strong>🏦 المحفظة:</strong> ${user.walletAddress}</div>
    <div><strong>🆔 المعرف:</strong> ${user.id}</div>
  `;
}

// ========== تسجيل الخروج ==========
function logout() {
  localStorage.removeItem(STORAGE_KEYS.CURRENT);
  localStorage.removeItem(STORAGE_KEYS.TOKEN);
  localStorage.removeItem(STORAGE_KEYS.USER_ID);
  localStorage.removeItem(STORAGE_KEYS.EMAIL);
  
  document.getElementById('authContainer').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  
  // تفريغ الحقول
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('googleCode').value = '';
  
  showToast('✓ تم تسجيل الخروج', 'success');
}

// ========== التحقق من الجلسة الحالية عند التحميل ==========
window.addEventListener('DOMContentLoaded', () => {
  const currentUser = getCurrentUser();
  if (currentUser) {
    showDashboard(currentUser);
  }
});
</script>
</body>
</html>
