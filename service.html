<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#000"><title>Service</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}html,body{height:100%;overflow:hidden;background:#000}body{display:flex;flex-direction:column;direction:rtl;color:#fff}.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#000;border-bottom:1px solid #222;flex-shrink:0}.top .exit{background:none;border:none;cursor:pointer;color:#fff;padding:4px;display:flex;align-items:center;justify-content:center;order:1}.top .name{font-size:18px;font-weight:600;color:#fff;direction:ltr;order:2}.top svg{width:22px;height:22px}.chat{flex:1;overflow-y:auto;padding:16px 12px;background:#0a0a0a;display:flex;flex-direction:column;gap:10px}.chat::-webkit-scrollbar{width:0}.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:15px;word-wrap:break-word;line-height:1.5;animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.msg.sent{background:#1c1c1e;color:#fff;align-self:flex-end;border-top-left-radius:4px}.msg.recv{background:#fff;color:#000;align-self:flex-start;border-top-right-radius:4px}.msg img{max-width:100%;border-radius:10px;display:block;cursor:pointer}.msg .t{display:block;font-size:10px;opacity:.65;margin-top:4px;text-align:left;direction:ltr}.bar{display:flex;align-items:center;gap:8px;padding:10px;background:#000;border-top:1px solid #222;flex-shrink:0}.bar input[type=text]{flex:1;border:1px solid #2a2a2a;border-radius:24px;padding:10px 14px;font-size:15px;outline:none;background:#1c1c1e;color:#fff;order:2}.bar input[type=text]:focus{border-color:#fff}.bar input[type=text]::placeholder{color:#666}.bar .snd{background:#fff;color:#000;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;order:1}.bar label{background:#1c1c1e;color:#fff;border:1px solid #2a2a2a;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;order:3}.bar input[type=file]{display:none}.bar svg{width:20px;height:20px}</style></head><body><div class="top"><button class="exit" onclick="ex()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button><div class="name">Service</div></div><div class="chat" id="chat"></div><div class="bar"><button class="snd" onclick="snd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button><input type="text" id="txt" placeholder="اكتب رسالة..." autocomplete="off"><label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><input type="file" id="img" accept="image/*"></label></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,doc,setDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";const fc={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(fc),db=getFirestore(app);let uid=localStorage.getItem("sv_uid");if(!uid){uid="u_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);localStorage.setItem("sv_uid",uid)}let uname=localStorage.getItem("sv_name");if(!uname){uname="زائر "+uid.slice(-5);localStorage.setItem("sv_name",uname)}const uref=doc(db,"chats",uid);setDoc(uref,{name:uname,uid,lastSeen:serverTimestamp()},{merge:!0});const mref=collection(db,"chats",uid,"messages"),chat=document.getElementById("chat"),txt=document.getElementById("txt"),img=document.getElementById("img");function tm(t){if(!t)return"";const d=t.toDate?t.toDate():new Date();return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")}function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}function add(m){const d=document.createElement("div");d.className="msg "+(m.from==="user"?"sent":"recv");if(m.type==="image")d.innerHTML='<img src="'+m.content+'"><span class="t">'+tm(m.createdAt)+'</span>';else d.innerHTML=esc(m.content)+'<span class="t">'+tm(m.createdAt)+'</span>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight}onSnapshot(query(mref,orderBy("createdAt","asc")),s=>{chat.innerHTML="";s.forEach(x=>add(x.data()))});async function send(c,ty){if(!c)return;await addDoc(mref,{from:"user",content:c,type:ty,createdAt:serverTimestamp()});setDoc(uref,{lastMessage:ty==="image"?"📷 صورة":c,lastTime:serverTimestamp(),name:uname,uid},{merge:!0})}window.snd=()=>{const v=txt.value.trim();if(!v)return;send(v,"text");txt.value=""};window.ex=()=>{window.location.href="index.html"};txt.addEventListener("keypress",e=>{if(e.key==="Enter")window.snd()});img.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;if(f.size>800000){alert("الصورة كبيرة جداً (الحد 800KB)");return}const r=new FileReader();r.onload=ev=>send(ev.target.result,"image");r.readAsDataURL(f);img.value=""});</script></body></html>
