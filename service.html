<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#000000"><title>Sorvego Support</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}html,body{height:100%;overflow:hidden;background:#fff}body{display:flex;flex-direction:column;direction:rtl}.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0}.top .name{font-size:18px;font-weight:600;color:#222;direction:ltr}.top .exit{background:none;border:none;font-size:22px;cursor:pointer;color:#333;padding:4px 8px}.chat{flex:1;overflow-y:auto;padding:16px 12px;background:#fafafa;display:flex;flex-direction:column;gap:10px}.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:15px;word-wrap:break-word;line-height:1.5;position:relative;animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.msg.sent{background:#fff;color:#222;align-self:flex-start;border:1px solid #eee;border-top-right-radius:4px}.msg.recv{background:#e53935;color:#fff;align-self:flex-end;border-top-left-radius:4px}.msg img{max-width:100%;border-radius:10px;display:block;cursor:pointer}.msg .t{display:block;font-size:10px;opacity:.65;margin-top:4px;text-align:left;direction:ltr}.bar{display:flex;align-items:center;gap:8px;padding:10px;background:#fff;border-top:1px solid #eee;flex-shrink:0}.bar input[type=text]{flex:1;border:1px solid #ddd;border-radius:24px;padding:10px 14px;font-size:15px;outline:none;background:#f5f5f5}.bar input[type=text]:focus{background:#fff;border-color:#e53935}.bar button{background:#e53935;color:#fff;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}.bar label{background:#f0f0f0;color:#555;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}.bar input[type=file]{display:none}.empty{text-align:center;color:#aaa;margin:auto;font-size:14px}</style></head><body><div class="top"><div class="name">Sorvego</div><button class="exit" onclick="ex()" title="خروج">✕</button></div><div class="chat" id="chat"></div><div class="bar"><label title="إرسال صورة">📎<input type="file" id="img" accept="image/*"></label><input type="text" id="txt" placeholder="اكتب رسالة..." autocomplete="off"><button onclick="snd()" title="إرسال">➤</button></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";import{getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,doc,setDoc}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";const fc={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(fc);const db=getFirestore(app);let uid=localStorage.getItem("sv_uid");if(!uid){uid="u_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);localStorage.setItem("sv_uid",uid)}let uname=localStorage.getItem("sv_name");if(!uname){uname="زائر "+uid.slice(-5);localStorage.setItem("sv_name",uname)}const uref=doc(db,"chats",uid);setDoc(uref,{name:uname,uid:uid,lastSeen:serverTimestamp()},{merge:!0});const mref=collection(db,"chats",uid,"messages");const chat=document.getElementById("chat");const txt=document.getElementById("txt");const img=document.getElementById("img");function tm(t){if(!t)return"";const d=t.toDate?t.toDate():new Date();return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")}function add(m){const d=document.createElement("div");d.className="msg "+(m.from==="user"?"sent":"recv");if(m.type==="image"){d.innerHTML='<img src="'+m.content+'"><span class="t">'+tm(m.createdAt)+'</span>'}else{d.innerHTML=document.createTextNode(m.content).textContent.replace(/</g,"&lt;")+'<span class="t">'+tm(m.createdAt)+'</span>'}chat.appendChild(d);chat.scrollTop=chat.scrollHeight}onSnapshot(query(mref,orderBy("createdAt","asc")),s=>{chat.innerHTML="";s.forEach(x=>add(x.data()))});async function send(c,ty){if(!c)return;await addDoc(mref,{from:"user",content:c,type:ty,createdAt:serverTimestamp()});setDoc(uref,{lastMessage:ty==="image"?"📷 صورة":c,lastTime:serverTimestamp(),name:uname,uid:uid},{merge:!0})}window.snd=()=>{const v=txt.value.trim();if(!v)return;send(v,"text");txt.value=""};window.ex=()=>{window.location.href="index.html"};txt.addEventListener("keypress",e=>{if(e.key==="Enter")window.snd()});img.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;if(f.size>800000){alert("الصورة كبيرة جداً (الحد 800KB)");return}const r=new FileReader();r.onload=ev=>{send(ev.target.result,"image")};r.readAsDataURL(f);img.value=""});</script></body></html>
